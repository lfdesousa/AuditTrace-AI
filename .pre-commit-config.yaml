repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        # Vendored upstream content must match source byte-for-byte so
        # diffs against upstream stay readable.
        exclude: ^docs/reference/
      - id: end-of-file-fixer
        exclude: ^docs/reference/
      - id: check-yaml
        exclude: ^charts/
      - id: check-added-large-files
        # OpenAI's OpenAPI spec is ~2.5MB. Vendoring it is load-bearing
        # (see docs/reference/openai/README.md — North Star for API
        # compatibility reviews). Bump the per-file cap and exempt the
        # spec explicitly so the refresh script needs no special casing.
        args: ['--maxkb=3000']
        exclude: ^docs/reference/openai/openapi\.yaml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - fastapi
          - types-redis
          - sqlalchemy
          - chromadb
          # minio is a runtime dep — including it here so pre-commit's
          # mypy sees the same `type[Minio]` as local `make lint` and the
          # two gates agree on whether `type: ignore` comments are needed
          # (was a 2026-05-03 stabilisation pickup).
          - minio
          # ADR-006 — audittrace-object-storage ships py.typed from
          # v0.1.1; include it so pre-commit's mypy resolves the ABC
          # types and downstream subclass checks succeed.
          - audittrace-object-storage @ git+https://github.com/lfdesousa/audittrace-object-storage.git@v0.1.1
        args: [--ignore-missing-imports]
        exclude: ^(scripts/|tests/)

  # Local gate that flags private/legal content (customer names,
  # contact details, pricing) before it lands in the public repo.
  # Per feedback_pitch_public_vs_private: this gate enforces the rule
  # mechanically rather than relying on memory. Patterns + exceptions
  # live in scripts/check-no-private-content.sh.
  - repo: local
    hooks:
      - id: no-private-content
        name: no private/legal content in public repo
        entry: scripts/check-no-private-content.sh
        language: script
        pass_filenames: false
        always_run: true

      # Drift guard: requirements.txt must always be regenerable from
      # pyproject.toml (the single source of truth for dependencies).
      # 2026-05-07 tier-A live-evidence capture diagnosed a silent
      # image-build degradation where pyproject got pyhanko +
      # pyhanko-certvalidator but requirements.txt did not, shipping an
      # image without the PAdES validation deps. This hook fires on any
      # change to either file and refuses commits where the two
      # disagree. Run `make sync-requirements` to fix.
      - id: requirements-sync
        name: requirements.txt is in sync with pyproject.toml
        entry: python3 scripts/sync-requirements.py --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|requirements\.txt)$

      # ADR-049 — Test, Evidence, and Reconstructibility Gate.
      # Refuses commits to src/audittrace/routes/** or
      # src/audittrace/services/** that lack an evidence reference
      # (PR URL, evidence-file path, or 32-hex-char trace ID) in
      # the commit message. The commit-msg stage gives the script
      # access to the message file as $1. Per ADR-049 §Decision
      # rule 4: NO override — fix the friction, do not bypass the
      # gate. Companion enforcement: PR template + CI evidence-check
      # job in .github/workflows/ci.yml.
      - id: commit-evidence
        name: ADR-049 commit-evidence gate (routes/services touch requires evidence ref)
        entry: scripts/check-commit-evidence.sh
        language: script
        stages: [commit-msg]
        pass_filenames: true
