# B7 step 1 (2026-05-15) — explicit rabbitmq.conf for compose
#
# Bitnami's auto-generated rabbitmq.conf adds
# `loopback_users.<RABBITMQ_USERNAME> = true` which restricts the
# application user to localhost-only connections — breaking
# cross-container compose access from memory-server. Rounds 3b-5
# tried env-var and RABBITMQ_EXTRA_CONF overrides; none took
# effect. This file is bitnami's documented "use my exact config"
# override path: when mounted at /bitnami/rabbitmq/conf/rabbitmq.conf
# the image uses it verbatim, skipping the auto-generation entirely.
#
# Anchor: project_pickup_20260515_b7 — B7 step 1, round 6.

# Listener configuration (RabbitMQ defaults — preserved).
listeners.tcp.default = 5672

# Management plugin port (RabbitMQ default — preserved).
management.tcp.port = 15672

# Default vhost (RabbitMQ default — preserved).
default_vhost = /

# ── Loopback restriction (the load-bearing setting for B7) ─────────
# RabbitMQ 3.13.x dot-notation: per-user true/false. Default
# behaviour without any loopback_users entries: NO users are
# restricted. We explicitly mark:
#   - guest = false  (override the historical default that restricts
#                     the `guest` user to localhost; in dev compose
#                     we don't use guest but it shouldn't be silently
#                     restricted either)
#   - audittrace = false  (the app user we create via RABBITMQ_USERNAME;
#                          ensure no later config can flip this to true)
loopback_users.guest = false
loopback_users.audittrace = false
