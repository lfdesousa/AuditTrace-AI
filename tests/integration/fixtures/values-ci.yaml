# AuditTrace-AI Helm values override for the kind-based PR-B10
# integration smoke test.
#
# Goal: prove the full chart deploys cleanly in a fresh kind cluster
# alongside the audittrace-content-control sibling chart, and that
# memory-server reaches a Ready state. NOT (yet) a full upload-flow
# test — that's PR-B11.
#
# Scope decisions:
#   - vault.enabled=false       — no Vault Agent injector in kind
#   - istio.enabled=false       — no Istio in kind (mTLS / AP are
#                                 production-only)
#   - keycloak.enabled=false    — heaviest subsystem; auth bypassed
#                                 at the app level so memory-server
#                                 doesn't talk to it
#   - observability disabled    — no Langfuse / Tempo / Otel-Collector
#   - tests.enabled=false       — the chart-bundled test-rls pod is
#                                 gated on vault.enabled=true anyway
#   - postgres/redis/rabbitmq/  — KEPT (memory-server's lifespan
#     minio/chromadb               connects to all five at startup)
#
# Auth-at-the-app-level: every AUDITTRACE_AUTH_* env var below disables
# Keycloak / JWT validation. The route handlers fall through with a
# synthetic ``audittrace-anonymous`` user_id.

# Tag matches what the workflow builds + kind-loads.
memoryServer:
  image:
    repository: audittrace-memory-server
    tag: ci
    pullPolicy: Never
  # Bypass Keycloak round-trip. JWT path is unit-tested elsewhere.
  env:
    AUDITTRACE_AUTH_ENABLED: "false"
    AUDITTRACE_AUTH_REQUIRED: "false"
    AUDITTRACE_LANGFUSE_ENABLED: "false"
    AUDITTRACE_METRICS_ENABLED: "true"
    AUDITTRACE_SUMMARIZER_ENABLED: "false"
    AUDITTRACE_PDF_SIGNATURE_CHECK_ENABLED: "false"
    AUDITTRACE_PDF_OCR_ENABLED: "false"
    AUDITTRACE_SCAN_PIPELINE_ENABLED: "true"
    # Match the chart's bindings — same exchange + routing-key as
    # production. Catches the PR-A5 verdict-correlation drift class
    # at the publish side.
    AUDITTRACE_SCAN_REQUEST_EXCHANGE: "audittrace.scan"
    AUDITTRACE_SCAN_REQUEST_ROUTING_KEY: "scan.request.new"

# vault.enabled=false branch — memory-server reads creds from
# the in-chart-rendered Secrets, NOT from /vault/secrets/env.
vault:
  enabled: false

# No Istio in kind.
istio:
  enabled: false

# Production posture would gate these out; for CI we keep them
# OFF explicitly.
keycloak:
  enabled: false

# Lightweight bitnami subcharts kept — memory-server connects at
# startup; without them the pod never reaches Ready.
#
# bitnamilegacy/* image redirects (for the Bitnami Hub sunset of
# August 2025) now live in the chart's default values.yaml — see
# Chart-A (2026-05-13). The CI values only override resources +
# persistence below so the kind cluster stays light.
postgresql:
  enabled: true
  primary:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    persistence:
      enabled: false

redis:
  enabled: true
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    persistence:
      enabled: false
  replica:
    replicaCount: 0

rabbitmq:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  persistence:
    enabled: false
  clustering:
    enabled: false

# In-chart StatefulSets (no subchart). PR-B10 first-run trip-wire:
# the chart defaults to storageClass=local-path; kind's default
# StorageClass is "standard" (backed by local-path-provisioner).
# Mismatch left both PVCs Pending forever. Smaller volume sizes
# also keep the CI runner's disk happy.
minio:
  enabled: true
  persistence:
    storageClass: "standard"
    size: 1Gi

chromadb:
  enabled: true
  persistence:
    storageClass: "standard"
    size: 1Gi

# Built-in chart tests are gated on vault.enabled=true; flip off
# explicitly to avoid render-time surprises.
tests:
  enabled: false

# Dev-only secret values. The chart's productionMode=false (default)
# accepts these.
global:
  hostNodeIP: "10.42.0.1"
  productionMode: false
  postgresql:
    auth:
      password: test-pg-pass
      postgresPassword: test-pg-pass
  redis:
    password: test-redis-pass

secrets:
  chromadb:
    token: test-chroma-token
  keycloak:
    adminPassword: test-keycloak-pass
  minio:
    secretKey: test-minio-key
    # kmsKey: MUST decode to EXACTLY 32 raw bytes (MinIO AES-256
    # KMS-master key). Old value `Y2lLb3R0YS1raW5kLWNpLWttcy1rZXktMzItYnk=`
    # decoded to 29 bytes → MinIO StatefulSet exit-1'd at startup
    # (CI run #3, 2026-05-13). This value decodes to
    # b"abcdefghijklmnopqrstuvwxyz123456" — 32 bytes exactly.
    # The chart's secret-minio.yaml prepends "audittrace-key:" so
    # MINIO_KMS_SECRET_KEY ends up as "<name>:<base64>" — the
    # format MinIO expects.
    kmsKey: "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="
    # ADR-048 PR-B7 — IAM-split users. memory-server's deployment
    # references audittrace-minio-iam with keys audittrace_app_user
    # / audittrace_app_password / content_control_user /
    # content_control_password. The chart's secret-minio-iam.yaml
    # only renders if at least one of the *Password values is set;
    # without them the Secret is absent and memory-server fails to
    # start with CreateContainerConfigError.
    audittraceAppPassword: test-minio-app-pass
    contentControlPassword: test-minio-cc-pass
  postgres:
    # Chart-B (2026-05-13) — appPassword and password are now genuinely
    # independent. Splitting them here is the CI verification gate:
    # if memory-server still reaches Ready, the wiring is correct (the
    # audittrace_app role was created with appPassword, and memory-server
    # connects via the same value through `audittrace.postgresAppUrl`).
    # Before Chart-B these values had to be equal — see
    # `templates/postgres/secret-postgres-app.yaml` + values.yaml
    # `postgresql.primary.extraEnvVars` for the wiring path. Anchor:
    # project_postgres_app_password_wiring.
    appPassword: test-app-pass-chart-b-verified
    password: test-postgres-superuser-pass
  redis:
    password: test-redis-pass
  summariser:
    password: test-summariser-pass
  # ADR-057 — separate user for the content-control sibling chart.
  # The chart's `secret-rabbitmq-content-control.yaml` only renders
  # when contentControlPassword is set; without it the AMQP topology
  # bootstrap Job can't create the user and content-control can't
  # connect at startup. Provision both here.
  rabbitmq:
    contentControlUser: content-control
    contentControlPassword: test-cc-rabbitmq-pass
