name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres service container for the RLS integration tests. Without
    # this the tests skipped silently and the RLS contract (migration 005,
    # ADR-026 §RLS posture) ran unverified in CI — a liability for a
    # compliance-first architecture.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: audittrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # tests/test_rls_isolation.py looks this up first; without it the
      # suite falls back to a localhost:15432 compose probe. In CI we
      # publish the service on :5432, so set the URL accordingly.
      AUDITTRACE_TEST_POSTGRES_URL: "postgresql+psycopg2://postgres:postgres@localhost:5432/audittrace"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Assert RLS integration tests are actually runnable
        # Belt + braces: prove the Postgres service is reachable before
        # we rely on it, and fail loudly (not silently skip) if it's not.
        run: |
          python - <<'PY'
          import socket
          with socket.create_connection(("localhost", 5432), timeout=10):
              print("postgres reachable on :5432 — RLS tests will run")
          PY

      - name: Tests + project-wide coverage gate (with junit-xml for skip audit)
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=90 \
            --junit-xml=junit.xml

      - name: Fail if any test was silently skipped
        # Zero-tolerance on skips in CI (directive 2026-04-18): a skip is
        # a missing assertion in disguise. If a test depends on an
        # environmental resource, CI provisions it (see the postgres
        # service above). Otherwise the test is broken and should be
        # fixed or deleted — never skipped.
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET, sys
          root = ET.parse("junit.xml").getroot()
          # junit's <testsuite> carries skipped="N"; roll them up.
          total = 0
          skipped = []
          for ts in root.iter("testsuite"):
              total += int(ts.get("skipped", "0"))
          # For names + reasons, inspect <skipped> children on testcases.
          for tc in root.iter("testcase"):
              for skip in tc.findall("skipped"):
                  skipped.append(
                      f"{tc.get('classname')}.{tc.get('name')} — "
                      f"{skip.get('message','<no reason>')}"
                  )
          if total:
              print("::error::%d skipped test(s) — skips are forbidden in CI." % total)
              for s in skipped[:20]:
                  print(f"  - {s}")
              sys.exit(1)
          print("No skipped tests. Good.")
          PY

      - name: Per-file coverage gate (each component >= 90%)
        # Mirrors `make test` locally: project-wide --cov-fail-under hides
        # individual file regressions. This step parses coverage.xml and
        # fails if ANY non-trivial source file is below 90%.
        run: python scripts/check-per-file-coverage.py

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30

  requirements-sync:
    # Drift guard: requirements.txt must equal what
    # `python3 scripts/sync-requirements.py` would regenerate from
    # pyproject.toml. Mirrors the pre-commit hook of the same name.
    # Closes the 2026-05-07 tier-A failure mode where pyhanko +
    # pyhanko-certvalidator landed in pyproject only and the image
    # silently shipped without the PAdES deps.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Assert requirements.txt is in sync with pyproject.toml
        run: python3 scripts/sync-requirements.py --check

  helm-lint:
    # Static chart validation — no cluster needed. Catches Helm syntax,
    # missing values, broken `include` directives, and template-render
    # errors at PR-review time. Complements scripts/deploy-preflight.sh
    # which runs the same checks (plus admission-time ones) at deploy time.
    # Added 2026-05-03 after a chart change reached deploy without any
    # static gate having run on it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: helm dependency update
        run: helm dependency update charts/audittrace

      - name: helm lint (vault.enabled=true — production path)
        run: |
          helm lint charts/audittrace \
            --set vault.enabled=true \
            --set secrets.minio.secretKey=ci-test \
            --set secrets.minio.kmsKey=ci-test \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid

      - name: helm lint (vault.enabled=false — dev fallback path)
        run: |
          helm lint charts/audittrace \
            --set vault.enabled=false \
            --set secrets.minio.secretKey=ci-test \
            --set secrets.minio.kmsKey=ci-test \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid

      # ADR-006 — second matrix axis: objectStorage.backend=aws. The MinIO
      # StatefulSet / Service / bucket-init Job MUST NOT render under this
      # branch. Both vault.enabled paths covered so the vault-annotation
      # gate (no MinIO secret block when backend=aws) also lints clean.
      - name: helm lint (objectStorage.backend=aws — vault.enabled=true)
        run: |
          helm lint charts/audittrace \
            --set vault.enabled=true \
            --set objectStorage.backend=aws \
            --set objectStorage.aws.region=eu-central-2 \
            --set objectStorage.aws.bucket=audittrace-loadtest-objects-ci \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid

      - name: helm lint (objectStorage.backend=aws — vault.enabled=false)
        run: |
          helm lint charts/audittrace \
            --set vault.enabled=false \
            --set objectStorage.backend=aws \
            --set objectStorage.aws.region=eu-central-2 \
            --set objectStorage.aws.bucket=audittrace-loadtest-objects-ci \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid

      - name: helm template (backend=aws asserts MinIO templates skip + AWS envs present)
        # ADR-006 acceptance criterion — when backend=aws the chart must
        # render NO `*-minio` StatefulSet/Service/Job and the memory-server
        # Deployment must carry AUDITTRACE_AWS_BUCKET + region (and NOT
        # AUDITTRACE_MINIO_URL). Regression for backend=minio leak.
        run: |
          helm template audittrace charts/audittrace -n audittrace \
            --set vault.enabled=false \
            --set objectStorage.backend=aws \
            --set objectStorage.aws.region=eu-central-2 \
            --set objectStorage.aws.bucket=audittrace-loadtest-objects-ci \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid \
            > /tmp/helm-rendered-aws.yaml
          # No MinIO templates may render when backend=aws.
          if grep -E '^kind: (StatefulSet|Job|Service)$' -A2 /tmp/helm-rendered-aws.yaml | grep -E 'name: audittrace-minio'; then
            echo "::error::backend=aws leaked a MinIO template into the rendered output (StatefulSet/Service/Job named *-minio)"
            exit 1
          fi
          # AUDITTRACE_AWS_BUCKET must be present on the memory-server Deployment.
          if ! grep -q "name: AUDITTRACE_AWS_BUCKET" /tmp/helm-rendered-aws.yaml; then
            echo "::error::backend=aws but AUDITTRACE_AWS_BUCKET env not present on rendered Deployment"
            exit 1
          fi
          # AUDITTRACE_MINIO_URL must NOT be present.
          if grep -q "name: AUDITTRACE_MINIO_URL" /tmp/helm-rendered-aws.yaml; then
            echo "::error::backend=aws but AUDITTRACE_MINIO_URL still rendered (cleanup gate missing)"
            exit 1
          fi
          echo "backend=aws rendering clean — no MinIO leak, AWS envs wired"

      # ADR-006 — assert backend=aws fails fast when required fields are
      # missing (region / bucket). Catches operator misconfiguration at
      # `helm template` time instead of letting the pod boot loop on a
      # broken settings load.
      - name: helm template (backend=aws missing region — must fail with clear diag)
        run: |
          if helm template audittrace charts/audittrace -n audittrace \
              --set vault.enabled=false \
              --set objectStorage.backend=aws \
              --set objectStorage.aws.bucket=audittrace-loadtest-objects-ci \
              --set secrets.chromadb.token=ci-test \
              --set secrets.keycloak.adminPassword=ci-test \
              --set secrets.postgres.appPassword=ci-test \
              --set secrets.postgres.password=ci-test \
              --set secrets.redis.password=ci-test \
              --set secrets.summariser.password=ci-test \
              --set externalLLM.host=llm.test.invalid \
              --set observability.external.langfuseHost=langfuse.test.invalid \
              --set observability.external.tempoHost=tempo.test.invalid \
              --set observability.external.lokiHost=loki.test.invalid \
              > /tmp/helm-missing-region.yaml 2>/tmp/helm-missing-region.err; then
            echo "::error::helm template should have FAILED for missing objectStorage.aws.region but rendered"
            exit 1
          fi
          grep -q "objectStorage.aws.region is empty" /tmp/helm-missing-region.err || {
            echo "::error::fail message did not mention objectStorage.aws.region"
            cat /tmp/helm-missing-region.err
            exit 1
          }
          echo "backend=aws missing-region fail-fast OK"

      - name: helm template (assert renders cleanly + contains vaultSecretFileGuard)
        # Renders the chart and grep-asserts the 2026-05-03 guard helper
        # is present in the args of every workload that sources
        # /vault/secrets/env. Regression test for the helper being
        # accidentally removed from a deployment template.
        run: |
          helm template audittrace charts/audittrace -n audittrace \
            --set vault.enabled=true \
            --set secrets.minio.secretKey=ci-test \
            --set secrets.minio.kmsKey=ci-test \
            --set secrets.chromadb.token=ci-test \
            --set secrets.keycloak.adminPassword=ci-test \
            --set secrets.postgres.appPassword=ci-test \
            --set secrets.postgres.password=ci-test \
            --set secrets.redis.password=ci-test \
            --set secrets.summariser.password=ci-test \
            --set externalLLM.host=llm.test.invalid \
            --set observability.external.langfuseHost=langfuse.test.invalid \
            --set observability.external.tempoHost=tempo.test.invalid \
            --set observability.external.lokiHost=loki.test.invalid \
            > /tmp/helm-rendered.yaml
          # Every chart that sources /vault/secrets/env MUST include the
          # guard. Count occurrences and assert >= 3 (chromadb, keycloak,
          # minio; memory-server uses entrypoint.sh which has its own check).
          guards=$(grep -c "Vault Agent did not inject /vault/secrets/env (exit 79)" /tmp/helm-rendered.yaml || echo 0)
          if [ "$guards" -lt 3 ]; then
            echo "::error::expected >=3 vaultSecretFileGuard occurrences, found $guards"
            echo "::error::regression: a deployment template lost its guard against missing /vault/secrets/env"
            exit 1
          fi
          echo "vaultSecretFileGuard present in $guards workloads — OK"

      - name: bash syntax check on deploy scripts
        run: |
          bash -n scripts/deploy-preflight.sh
          bash -n scripts/check-vault-injector.sh
          bash -n scripts/entrypoint.sh

  release-version-check:
    # Pre-tag drift guard: when a v* tag is pushed, the tag MUST equal
    # pyproject.toml::version. Catches the v1.0.10→v1.0.11 release
    # drift class (tagged the merge commit without bumping the version
    # string; OpenAPI spec self-identified as 1.0.10 while the running
    # code was v1.0.11). Companion test: tests/test_version_drift.py
    # pins the same value across pyproject ↔ models.py ↔ server.py.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Assert pushed tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pyproject_version=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$pyproject_version" ]; then
            echo "::error::tag v$tag != pyproject.toml version $pyproject_version"
            echo "::error::Bump pyproject + models + server fallback before tagging (see tests/test_version_drift.py)."
            exit 1
          fi
          echo "tag v$tag == pyproject.toml version $pyproject_version — OK"

  evidence-check:
    # Test, Evidence, and Reconstructibility Gate (ADR-049). Hard
    # gate: PR cannot merge to main without populated Verification +
    # Validation + Reconstruction sections in the PR body. No
    # override mechanism — fix the friction (capture the evidence)
    # rather than bypass the gate. The PR template at
    # .github/pull_request_template.md pre-populates the sections so
    # contributors see the requirement at PR-creation time. This
    # job catches the failure mode where sections are present but
    # left empty as bare checklist lines.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch PR body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq .body > /tmp/pr_body.md
          echo "PR body fetched ($(wc -l < /tmp/pr_body.md) lines)"

      - name: Parse evidence sections
        run: |
          python3 <<'PY'
          # ADR-049 evidence-check parser. Required sections:
          #   ## Verification (unit)
          #   ## Validation (end-to-end against deployed image)
          #   ## Reconstruction (audit artefacts)
          #
          # Heuristic for "populated": each section must contain
          # AT LEAST ONE of (a) a checked box ``- [x]`` (case-insensitive),
          # OR (b) a fenced code block whose content is not purely
          # template placeholders (i.e. contains characters outside
          # the ``<...>`` placeholder shape). Empty checklists with all
          # boxes unchecked fail the gate — checking a box is a
          # deliberate, visible action that confirms the contributor
          # produced the artefact named by that line.
          import pathlib, re, sys

          body = pathlib.Path("/tmp/pr_body.md").read_text(encoding="utf-8")

          required = [
              ("Verification", r"^##\s+Verification\b"),
              ("Validation", r"^##\s+Validation\b"),
              ("Reconstruction", r"^##\s+Reconstruction\b"),
          ]

          # Split body into sections keyed by H2 heading.
          sections: dict[str, list[str]] = {}
          current: str | None = None
          for line in body.splitlines():
              h2 = re.match(r"^##\s+(.+)$", line)
              if h2:
                  current = h2.group(1).strip()
                  sections[current] = []
              elif current is not None:
                  sections[current].append(line)

          def section_is_populated(lines: list[str]) -> bool:
              # Signal A: at least one checked box.
              for raw in lines:
                  if re.match(r"^\s*-\s*\[x\]", raw, flags=re.IGNORECASE):
                      return True
              # Signal B: a fenced code block whose content is not
              # purely <placeholder> markers.
              in_fence = False
              fence_buf: list[str] = []
              for raw in lines:
                  if raw.strip().startswith("```"):
                      if in_fence:
                          # End of fence — inspect what we collected.
                          collected = "\n".join(fence_buf).strip()
                          stripped_placeholders = re.sub(
                              r"<[^>]*>", "", collected
                          ).strip()
                          if stripped_placeholders:
                              return True
                          fence_buf = []
                      in_fence = not in_fence
                  elif in_fence:
                      fence_buf.append(raw)
              return False

          failures: list[str] = []
          for label, pattern in required:
              matched_key = next(
                  (k for k in sections if re.match(pattern, f"## {k}")),
                  None,
              )
              if matched_key is None:
                  failures.append(
                      f"Missing required section: ## {label}"
                  )
                  continue
              if not section_is_populated(sections[matched_key]):
                  failures.append(
                      f"Section ## {matched_key} has no checked box "
                      f"and no populated code block — looks like the "
                      f"template is unfilled"
                  )

          if failures:
              print("::error::ADR-049 evidence gate FAILED")
              for f in failures:
                  print(f"::error::  - {f}")
              print(
                  "::error::See ADR-049 + .github/pull_request_template.md. "
                  "Check at least one box per section, OR paste real "
                  "command output into a code block. No override available."
              )
              sys.exit(1)
          print("ADR-049 evidence gate: PASSED")
          PY
