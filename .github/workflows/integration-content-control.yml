name: Integration — content-control smoke (kind)

# Paired smoke test for the audittrace-content-control sibling chart.
# Spins up a one-node kind cluster, installs both charts together
# (audittrace from local source + audittrace-content-control from OCI
# v0.0.7), and verifies the memory-server pod reaches Ready alongside
# its dependencies.
#
# Scope (PR-B10 — smoke test only):
#   - chart-install succeeds (catches PR-A8 OCI-collision class on
#     the audittrace side + chart-rendering bugs)
#   - memory-server pod reaches Ready (proves it can talk to
#     PostgreSQL + MinIO + RabbitMQ + ChromaDB at startup)
#   - content-control pod reaches Ready (proves the published v0.0.7
#     OCI image actually runs)
#   - GET /health returns 200 via port-forward
#
# NOT in scope for THIS PR:
#   - POST /memory/upload end-to-end flow → that's PR-B11
#   - JWT / Keycloak auth path → covered by unit tests; bypassed via
#     AUDITTRACE_AUTH_ENABLED=false (auth-bypass is OK in CI; the
#     production chart still mandates JWT)
#   - Real Vault / Istio / Langfuse / Tempo → too heavy for CI; the
#     production chart still uses them
#
# Companion workflow: audittrace-content-control/.github/workflows/
# integration.yml (PR-A11) drives the full async scan pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # 2026-05-14 B1.5 — pull ghcr.io/lfdesousa/audittrace-{postgresql,redis}
  # mirror of the pre-sunset bitnami images that prod runs. Without
  # this, GITHUB_TOKEN can't reach the private packages and the kind
  # cluster fails to deploy postgres/redis. Packages are linked to
  # this repo with Read role via the user's package settings.
  packages: read

concurrency:
  group: integration-cc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Kind smoke (both charts)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.24.0
          cluster_name: integration-cc

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.0

      - name: Add Helm repos + build chart deps
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm dependency build charts/audittrace

      - name: Login to GitHub Container Registry (ghcr.io)
        # Pre-pull step below renders the chart, parses every
        # `image:` line, docker-pulls each. With B1.5 the postgres
        # and redis refs point at `ghcr.io/lfdesousa/audittrace-*`
        # (private packages). GITHUB_TOKEN has packages:read via the
        # workflow's `permissions` block (top of file) AND the
        # package's "Manage Actions access" allowlist includes this
        # repo. Login here so the docker pull below authenticates.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl get nodes
          free -m

      - name: Build memory-server image
        # `runtime` is the last stage in Dockerfile, so the default
        # `docker build .` produces the runtime image. The test image
        # moved to its own file (`Dockerfile.tests`) in Chart-A
        # (2026-05-13) precisely so this build can't accidentally
        # produce the tests image — trip-wired on PR-B10 CI run #3.
        run: docker build -t audittrace-memory-server:ci .

      - name: Load memory-server image into kind
        run: kind load docker-image audittrace-memory-server:ci --name integration-cc

      - name: Build LLM stub image
        # Single stub source (images/llm-stub) — same Dockerfile the
        # published lfds/audittrace-llm-stub image is built from. The
        # chart's llmStub component (values-ci.yaml) references this as
        # audittrace-llm-stub:ci with pullPolicy=Never.
        run: docker build -t audittrace-llm-stub:ci images/llm-stub

      - name: Load LLM stub image into kind
        run: kind load docker-image audittrace-llm-stub:ci --name integration-cc

      - name: Pre-pull + kind-load every cc-chart image
        run: |
          # Dynamic pre-pull mirrors the audittrace chart step below:
          # render the cc chart against our values override, parse every
          # `image:` line, pre-pull + kind-load each. Catches THREE images
          # in cc-chart v0.0.7:
          #   - docker.io/lfds/audittrace-content-control:<tag>   (control-plane)
          #   - clamav/clamav:1.4                                  (clamd sidecar)
          #   - docker.io/curlimages/curl:8.16.0                   (init container)
          # Static pre-pull of only the control-plane image (the old step)
          # missed the other two AND used the wrong registry-prefix form
          # (`lfds/...` vs the chart-rendered `docker.io/lfds/...`).
          # Trip-wired on PR-B10 CI run after `b7856e7`: ErrImageNeverPull
          # on the control-plane container because kubelet treats
          # `lfds/x` and `docker.io/lfds/x` as distinct refs under
          # pullPolicy=Never.
          set -e
          # 2026-05-14 B6 downstream: bumped 0.0.7 -> 0.0.9. cc-chart
          # v0.0.9 templates image.tag default to .Chart.AppVersion
          # (also 0.0.9), so the rendered image is the published
          # `lfds/audittrace-content-control:0.0.9` automatically —
          # no separate image.tag pin in values-cc-ci.yaml needed.
          helm pull oci://registry-1.docker.io/lfds/audittrace-content-control-chart \
            --version 0.0.9 \
            --untar --untardir /tmp/cc-chart
          images=$(helm template cc /tmp/cc-chart/audittrace-content-control-chart \
            --namespace default \
            --values tests/integration/fixtures/values-cc-ci.yaml \
            | grep -E "^[[:space:]]+image:" \
            | awk '{print $2}' \
            | tr -d '"' | tr -d "'" \
            | sort -u)
          echo "cc-chart images to load:"
          echo "$images"
          echo
          for img in $images; do
            echo "▶ pull + kind-load $img"
            docker pull "$img" || { echo "::warning::failed to pull $img"; continue; }
            kind load docker-image "$img" --name integration-cc || \
              echo "::warning::failed to kind-load $img"
          done

      - name: Pre-pull + kind-load every chart-rendered image
        run: |
          # First CI run hit ImagePullBackOff on postgresql, redis,
          # rabbitmq — Docker Hub anonymous-pull rate-limit (100/6h
          # per shared GHA runner IP). Dynamic extraction: render the
          # chart against values-ci.yaml, parse every `image:` line,
          # pre-pull on the runner, kind-load into the cluster.
          # Image refs follow whatever the chart says, so no
          # hardcoded list to drift.
          set -e
          images=$(helm template audittrace charts/audittrace \
            --namespace default \
            --values tests/integration/fixtures/values-ci.yaml \
            | grep -E "^[[:space:]]+image:" \
            | awk '{print $2}' \
            | tr -d '"' | tr -d "'" \
            | sort -u)
          echo "Images to load:"
          echo "$images"
          echo
          for img in $images; do
            # Skip locally-built images (already kind-loaded earlier).
            case "$img" in
              audittrace-memory-server:ci|audittrace-llm-stub:ci|lfds/audittrace-content-control:0.0.7)
                echo "  ↻ skip $img (already loaded)"
                continue
                ;;
            esac
            echo "▶ pull + kind-load $img"
            docker pull "$img" || { echo "::warning::failed to pull $img"; continue; }
            kind load docker-image "$img" --name integration-cc || \
              echo "::warning::failed to kind-load $img"
          done

      - name: Helm install audittrace (chart)
        run: |
          # `--wait` is safe again now that memory-server's lifespan
          # is resilient to connect-refused (retry-with-backoff) AND
          # idempotently active-declares its AMQP exchange. The chart's
          # `job-amqp-topology-bootstrap` post-install hook still
          # creates queues + bindings; the exchange declare composes
          # because RabbitMQ no-ops matching re-declares. See
          # `src/audittrace/services/scan_amqp_client.py::ensure_connected`
          # and `tests/test_scan_amqp_client.py::TestEnsureConnected`
          # for the resilience contract + coverage.
          helm install audittrace charts/audittrace \
            --namespace default \
            --values tests/integration/fixtures/values-ci.yaml \
            --wait --timeout=15m

      - name: Helm install audittrace-content-control (OCI v0.0.7)
        run: |
          # Read content-control's RabbitMQ + MinIO creds from the
          # Secrets the audittrace chart rendered:
          #   audittrace-rabbitmq-content-control → content-control user
          #     password (provisioned by `secrets.rabbitmq.content
          #     ControlPassword` in audittrace values-ci.yaml; AMQP
          #     topology bootstrap Job creates the user in RabbitMQ
          #     using these creds).
          #   audittrace-minio-iam → content-control's MinIO IAM user
          #     (split-IAM per ADR-048 PR-B7).
          RABBIT_PASS=$(kubectl get secret audittrace-rabbitmq-content-control \
            -o jsonpath='{.data.password}' | base64 -d)
          MINIO_KEY=$(kubectl get secret audittrace-minio-iam \
            -o jsonpath='{.data.content_control_user}' | base64 -d)
          MINIO_SEC=$(kubectl get secret audittrace-minio-iam \
            -o jsonpath='{.data.content_control_password}' | base64 -d)
          kubectl create secret generic cc-audittrace-content-control-creds \
            --from-literal=rabbitmq_password="${RABBIT_PASS}" \
            --from-literal=minio_access_key="${MINIO_KEY}" \
            --from-literal=minio_secret_key="${MINIO_SEC}"

          # Use a values file (NOT --set) so empty collections parse
          # as empty lists, not empty maps. Trip-wired on PR-B10 CI
          # run #9: `--set istio.authorizationPolicy.allowedSourcePrincipals={}`
          # produced an empty MAP (truthy), so the AuthorizationPolicy
          # template rendered and the install failed with
          #   "no matches for kind 'AuthorizationPolicy' in version
          #   'security.istio.io/v1' — ensure CRDs are installed first".
          helm install cc oci://registry-1.docker.io/lfds/audittrace-content-control-chart \
            --version 0.0.9 \
            --namespace default \
            --values tests/integration/fixtures/values-cc-ci.yaml \
            --wait --timeout=10m

      - name: Show deployed state
        if: always()
        run: |
          kubectl get pods -o wide
          kubectl get svc

      - name: Smoke test — memory-server /health
        run: |
          kubectl port-forward svc/audittrace-memory-server 8765:8765 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3
          curl -fsS http://localhost:8765/health
          echo
          echo "✓ memory-server /health responded"

      - name: Verify LLM stub Ready (chart-rendered llmStub component)
        run: |
          # values-ci.yaml sets llmStub.enabled=true + externalLLM.enabled
          # =false, so `helm install audittrace` above already rendered the
          # stub Deployment (audittrace-llm-stub) + the three Services
          # (audittrace-llm-chat/-llm-embed/-llm-summarizer) that shadow the
          # names memory-server hardcodes. No separate fixture apply needed.
          kubectl rollout status deployment/audittrace-llm-stub --timeout=120s
          echo "✓ audittrace-llm-stub Ready"
          # Sanity probe through the chart-rendered Service name (proves the
          # wiring): hit /health via port-forward (svc 11435 -> stub 8080).
          kubectl port-forward svc/audittrace-llm-chat 11435:11435 &
          PF_LLM=$!
          trap 'kill ${PF_LLM} 2>/dev/null || true' EXIT
          sleep 2
          curl -fsS http://localhost:11435/health
          echo
          echo "✓ audittrace-llm-chat resolves to the stub"

      - name: B4 E2E — POST /memory/upload (clean + eicar) → terminal verdict
        run: |
          # Mirrors the Bruno collection:
          #   bruno/audittrace/memory/upload-pdf-clean.bru
          #   bruno/audittrace/memory/upload-status-clean.bru
          #   bruno/audittrace/memory/upload-pdf.bru
          #   bruno/audittrace/memory/upload-status.bru
          # Auth: AUDITTRACE_AUTH_ENABLED=false in CI → sentinel admin
          # user, no JWT needed. In prod the same flow goes via the
          # Istio Gateway with a Keycloak-minted bearer token.
          set -euo pipefail

          # Generate the two test PDFs. The proper-PDF EICAR pattern was
          # proven 2026-05-14: a bare-signature non-PDF fails clamd's
          # PDF-aware extraction (returns clean even though the bytes
          # are there). Putting the EICAR signature as the raw stream
          # body of a PDF object reliably triggers
          # `Eicar-Test-Signature FOUND`.
          python3 - <<'PYEOF'
          import pathlib

          def build_pdf(stream_body: bytes) -> bytes:
              header = b"%PDF-1.4\n"
              o1 = b"1 0 obj\n<</Type/Catalog/Pages 2 0 R>>\nendobj\n"
              o2 = b"2 0 obj\n<</Type/Pages/Count 1/Kids[3 0 R]>>\nendobj\n"
              o3 = b"3 0 obj\n<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Contents 4 0 R>>\nendobj\n"
              o4 = (
                  b"4 0 obj\n<</Length " + str(len(stream_body)).encode() + b">>\n"
                  b"stream\n" + stream_body + b"\nendstream\nendobj\n"
              )
              body = header + o1 + o2 + o3 + o4
              offsets = [
                  len(header),
                  len(header) + len(o1),
                  len(header) + len(o1) + len(o2),
                  len(header) + len(o1) + len(o2) + len(o3),
              ]
              xref_offset = len(body)
              xref = b"xref\n0 5\n0000000000 65535 f \n"
              for off in offsets:
                  xref += f"{off:010d} 00000 n \n".encode()
              trailer = (
                  b"trailer\n<</Size 5/Root 1 0 R>>\nstartxref\n"
                  + str(xref_offset).encode() + b"\n%%EOF\n"
              )
              return body + xref + trailer

          eicar = b'X5O!P%@AP[4\\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*'
          pathlib.Path("/tmp/clean.pdf").write_bytes(build_pdf(b"benign-test-content"))
          pathlib.Path("/tmp/eicar.pdf").write_bytes(build_pdf(eicar))
          print(f"clean.pdf: {pathlib.Path('/tmp/clean.pdf').stat().st_size}B")
          print(f"eicar.pdf: {pathlib.Path('/tmp/eicar.pdf').stat().st_size}B")
          PYEOF

          # Port-forward to memory-server (already done by previous step's
          # background process, but that one's about to be torn down by
          # the EXIT trap — re-establish in THIS step's scope).
          kubectl port-forward svc/audittrace-memory-server 8765:8765 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3

          BASE="http://localhost:8765"

          poll_until_terminal() {
            local scan_id="$1" expected="$2" fixture="$3"
            local status=""
            for i in $(seq 1 60); do
              status=$(curl -fsS "${BASE}/memory/upload/status?scan_id=${scan_id}" | jq -r .status)
              echo "  [${fixture} poll $i/60] status=${status}"
              case "${status}" in
                "${expected}") return 0 ;;
                pending_scan|scanning) sleep 2; continue ;;
                *)
                  echo "✗ ${fixture}: terminal status ${status} != expected ${expected}"
                  return 1
                  ;;
              esac
            done
            echo "✗ ${fixture}: timeout waiting for ${expected} (last status=${status})"
            return 1
          }

          for fixture in clean eicar; do
            if [ "${fixture}" = "clean" ]; then
              expected="scanned_clean"
            else
              expected="rejected_malware"
            fi
            echo "── POST /memory/upload (${fixture}.pdf) ──"
            RESP=$(curl -fsS -X POST \
              -F "file=@/tmp/${fixture}.pdf;type=application/pdf" \
              "${BASE}/memory/upload?layer=episodic")
            echo "${RESP}" | jq .
            SCAN_ID=$(echo "${RESP}" | jq -r .scan_id)
            [ -n "${SCAN_ID}" ] && [ "${SCAN_ID}" != "null" ] \
              || { echo "✗ no scan_id in 202 body"; exit 1; }
            # Bruno upload-pdf{,-clean}.bru shape assertions:
            echo "${RESP}" | jq -e '.status == "pending_scan"' >/dev/null \
              || { echo "✗ initial status != pending_scan"; exit 1; }
            echo "${RESP}" | jq -e '.poll_url | test("/memory/upload/status\\?scan_id=")' >/dev/null \
              || { echo "✗ poll_url shape wrong"; exit 1; }
            echo "${RESP}" | jq -e '.object_uri | contains("/quarantine/")' >/dev/null \
              || { echo "✗ object_uri not in /quarantine/"; exit 1; }
            echo "${RESP}" | jq -e '(.object_uri | contains("/episodic/papers/")) | not' >/dev/null \
              || { echo "✗ object_uri leaked into /episodic/papers/"; exit 1; }
            echo "${RESP}" | jq -e '.object_sha256 | length == 64' >/dev/null \
              || { echo "✗ sha256 length != 64"; exit 1; }
            echo "  ✓ ${fixture} POST shape OK; scan_id=${SCAN_ID}"
            poll_until_terminal "${SCAN_ID}" "${expected}" "${fixture}"
            echo "✓ ${fixture}.pdf → ${expected}"
          done

      - name: B4 E2E — POST /v1/chat/completions via LLM stub
        run: |
          # Mirrors bruno/audittrace/chat/02-chat-completions.bru.
          # Hits memory-server's chat-completions handler which proxies
          # to audittrace-llm-chat:11435 (the stub). Per
          # `feedback_openai_schema_inviolate` the response must keep
          # the OpenAI choices[0].message shape exactly.
          set -euo pipefail
          kubectl port-forward svc/audittrace-memory-server 8765:8765 &
          PF=$!
          trap 'kill ${PF} 2>/dev/null || true' EXIT
          sleep 3

          BODY='{"model":"audittrace-default","messages":[{"role":"user","content":"Reply with a single word: bruno"}],"stream":false,"max_tokens":256}'
          RESP=$(curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            "http://localhost:8765/v1/chat/completions")
          echo "${RESP}" | jq .
          # Bruno chat-completions.bru shape assertions:
          echo "${RESP}" | jq -e '.choices | type == "array"' >/dev/null \
            || { echo "✗ choices is not an array"; exit 1; }
          echo "${RESP}" | jq -e '.choices[0].message.role == "assistant"' >/dev/null \
            || { echo "✗ message.role != assistant"; exit 1; }
          echo "${RESP}" | jq -e '.choices[0].message.content | type == "string"' >/dev/null \
            || { echo "✗ message.content not a string"; exit 1; }
          echo "✓ /v1/chat/completions OpenAI shape preserved via llm-stub"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "── all pods ──"
          kubectl get pods -A -o wide
          echo
          echo "── memory-server logs ──"
          kubectl logs -l app.kubernetes.io/component=memory-server --tail=300 || true
          echo
          echo "── content-control logs ──"
          kubectl logs -l app.kubernetes.io/name=audittrace-content-control -c control-plane --tail=200 || true
          echo
          echo "── llm-stub logs ──"
          kubectl logs -l app.kubernetes.io/component=llm-stub --tail=80 || true
          echo
          echo "── postgres logs ──"
          kubectl logs -l app.kubernetes.io/name=postgresql --tail=80 || true
          echo
          echo "── rabbitmq logs ──"
          kubectl logs -l app.kubernetes.io/name=rabbitmq --tail=80 || true
          echo
          echo "── rabbitmq queue state (scan pipeline) ──"
          # Mirror what the B4a forensic used to identify the
          # silently-stuck queue (`audittrace.scan.requests msgs=N
          # consumers=0`). Surfaces the cc-worker-not-attached class.
          RMQ_PW=$(kubectl get secret audittrace-rabbitmq \
            -o jsonpath='{.data.rabbitmq-password}' | base64 -d 2>/dev/null || echo "")
          if [ -n "${RMQ_PW}" ]; then
            kubectl port-forward svc/audittrace-rabbitmq 15672:15672 >/dev/null 2>&1 &
            sleep 2
            curl -fsS -u "audittrace:${RMQ_PW}" "http://localhost:15672/api/queues" 2>/dev/null \
              | jq -r '.[] | select(.name | startswith("audittrace.")) | "  \(.name) msgs=\(.messages // 0) consumers=\(.consumers // 0)"' \
              || echo "  (mgmt API unreachable)"
          fi
          echo
          echo "── minio logs ──"
          kubectl logs audittrace-minio-0 --tail=80 || true
          echo
          echo "── chromadb logs ──"
          kubectl logs audittrace-chromadb-0 --tail=80 || true
          echo
          echo "── pod describe (failed) ──"
          for pod in $(kubectl get pods -o name | grep -v Running); do
            kubectl describe "${pod}" || true
          done
