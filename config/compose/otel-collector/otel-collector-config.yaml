# B7 step 7 — minimum-viable otel-collector config for compose `obs` profile.
# Receives OTLP from memory-server, fans out to:
#   - Tempo (traces) via OTLP/HTTP
#   - Loki  (logs) via Loki-native HTTP push (otelcol-contrib has the exporter)
# Operators with the profile active set AUDITTRACE_OTLP_ENDPOINT=http://otel-collector:4318.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
