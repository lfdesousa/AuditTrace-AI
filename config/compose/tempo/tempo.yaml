# B7 step 7 — minimum-viable Tempo config for compose `obs` profile.
# Single-binary, local-filesystem storage. Sufficient for dev runtime;
# production runs the chart's Tempo deployment with object-storage backend.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 100_000_000
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: audittrace-compose-dev
  storage:
    path: /var/tempo/generator/wal
