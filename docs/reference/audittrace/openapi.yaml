info:
  description: 'EU-AI-Act-aligned audit trail for LLM workloads. OpenAI-compatible ``/v1/chat/completions`` proxy with 4-layer
    memory augmentation (episodic + procedural + conversational + semantic), Keycloak-delegated identity, Postgres RLS per-user
    isolation, and opt-in Redis-Streams async persistence (ADR-046).


    See ``docs/architecture/`` for C4 + sequence diagrams; the ADR set (014–046) is the source of truth for design decisions.'
  title: AuditTrace-AI
openapi: 3.1.0
paths:
  /context:
    post:
      description: Retrieve relevant context from all 4 memory layers.
      operationId: get_context_context_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextBuildResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Context
      tags:
      - context
  /health:
    get:
      description: Health check endpoint for Kubernetes/docker probes.
      operationId: health_check_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Health Check
      tags:
      - health
  /interactions:
    get:
      description: 'List interactions the caller is allowed to see (RLS-scoped).


        Returns ``{interactions: [...], total, limit, offset}`` — ``total`` is

        the row count matching the filters *for the caller*; it''s what paginators

        need to render page counts.'
      operationId: list_interactions_interactions_get
      parameters:
      - description: Filter by project tag (ADR-029).
        in: query
        name: project
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by project tag (ADR-029).
          title: Project
      - description: Filter by Keycloak sub. RLS already scopes results to the caller, so this narrows *within* the caller's
          own rows.
        in: query
        name: user_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by Keycloak sub. RLS already scopes results to the caller, so this narrows *within* the caller's
            own rows.
          title: User Id
      - description: Filter by session id.
        in: query
        name: session_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by session id.
          title: Session Id
      - description: Filter by agent source (opencode, curl, continue, …).
        in: query
        name: source
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by agent source (opencode, curl, continue, …).
          title: Source
      - description: ISO-8601 timestamp. Only rows with timestamp >= since are returned.
        in: query
        name: since
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: ISO-8601 timestamp. Only rows with timestamp >= since are returned.
          title: Since
      - description: 'Filter by status: ''success'' or ''failed'' (migration 007 / ADR-033). Use ''failed'' to enumerate rows
          where the chat path errored out.'
        in: query
        name: status
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by status: ''success'' or ''failed'' (migration 007 / ADR-033). Use ''failed'' to enumerate
            rows where the chat path errored out.'
          title: Status
      - description: Max rows (1-1000).
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Max rows (1-1000).
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
      - description: Pagination offset.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Pagination offset.
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InteractionListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Interactions
      tags:
      - audit
    post:
      description: 'Create a new interaction audit record.


        Still a stub — the chat route already writes every interaction to

        Postgres on the hot path via ``_persist_interaction``; an external

        POST is only useful if a non-chat source wants to seed the audit

        trail directly. Leaving the shape in place so the route contract

        does not change; wiring is a small follow-up.'
      operationId: create_interaction_interactions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InteractionRecord'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Create Interaction Interactions Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Interaction
      tags:
      - audit
  /memory/conversational:
    get:
      description: 'List the caller''s own chat sessions, ordered by date DESC.


        RLS-scoped: the caller only sees rows whose ``user_id`` matches

        their JWT ``sub``. No cross-user reads are possible from this

        endpoint, even if the caller crafts a ``user_id`` filter — the

        ``after_begin`` listener sets ``app.current_user_id`` and the

        Postgres policy on ``sessions`` filters it.'
      operationId: list_conversational_sessions_memory_conversational_get
      parameters:
      - description: Filter by project tag (ADR-029).
        in: query
        name: project
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by project tag (ADR-029).
          title: Project
      - description: ISO date string. Only sessions with ``date >= since`` are returned.
        in: query
        name: since
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: ISO date string. Only sessions with ``date >= since`` are returned.
          title: Since
      - description: true → only rows with ``summarized_at`` populated; false → only un-summarised rows; omit → both.
        in: query
        name: summarised
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: true → only rows with ``summarized_at`` populated; false → only un-summarised rows; omit → both.
          title: Summarised
      - in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationalListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Conversational Sessions
      tags:
      - memory
  /memory/conversational/{session_id}:
    get:
      description: 'Fetch one session''s metadata + its interactions, ordered by

        timestamp ASC (chronological). RLS gates visibility — calling on a

        session_id that exists but belongs to another user returns 404

        (not 403) so the caller can''t probe for foreign session ids.'
      operationId: read_conversational_session_memory_conversational__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 500
          maximum: 5000
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationalDetailResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Read Conversational Session
      tags:
      - memory
  /memory/episodic:
    get:
      description: 'List ADRs. Merges manifest rows with S3 objects so pre-PR-A

        content (uploaded via /memory/upload or seeded via index-chromadb)

        surfaces alongside operator-created items.


        ``include_deleted=true`` returns soft-deleted manifest rows; it

        has no effect on discovered entries (they have no soft-delete

        state).'
      operationId: list_episodic_memory_episodic_get
      parameters:
      - in: query
        name: include_deleted
        required: false
        schema:
          default: false
          title: Include Deleted
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response List Episodic Memory Episodic Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Episodic
      tags:
      - memory
    post:
      description: 'Create an ADR. Body: ``{filename, content, title?}``.


        Idempotent on the manifest: re-creating a soft-deleted item revives

        it (clearing ``deleted_at_ms``) and bumps ``modified_at_ms``.'
      operationId: create_episodic_memory_episodic_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              description: '{filename, content, title?}'
              title: Payload
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Create Episodic Memory Episodic Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Episodic
      tags:
      - memory
  /memory/episodic/{filename}:
    delete:
      description: Soft-delete by default; ``?hard=true`` also purges the S3 object.
