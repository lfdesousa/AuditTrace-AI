  /sessions:
    get:
      description: 'List sessions the caller is allowed to see (RLS-scoped).


        Mirrors the shape of ``GET /interactions``:

        ``{sessions: [...], total, limit, offset}``. Ordered by ``date``

        DESC so the freshest sessions come first — matches how the

        Langfuse and Grafana dashboards want to read the data.'
      operationId: list_sessions_sessions_get
      parameters:
      - description: Filter by project tag (ADR-029).
        in: query
        name: project
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by project tag (ADR-029).
          title: Project
      - description: Filter by Keycloak sub. RLS already scopes results to the caller, so this narrows *within* the caller's
          own rows.
        in: query
        name: user_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by Keycloak sub. RLS already scopes results to the caller, so this narrows *within* the caller's
            own rows.
          title: User Id
      - description: ISO date string. Only sessions with ``date >= since`` are returned.
        in: query
        name: since
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: ISO date string. Only sessions with ``date >= since`` are returned.
          title: Since
      - description: true → only rows with ``summarized_at`` populated; false → only un-summarised rows; omit → both.
        in: query
        name: summarised
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: true → only rows with ``summarized_at`` populated; false → only un-summarised rows; omit → both.
          title: Summarised
      - description: Max rows (1-1000).
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Max rows (1-1000).
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
      - description: Pagination offset.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Pagination offset.
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Sessions
      tags:
      - audit
  /v1/chat/completions:
    post:
      description: 'OpenAI-compatible chat completions with memory augmentation.


        Raw dict pass-through proxy: every field on the inbound request is

        forwarded to llama-server unchanged except ``messages``, which has the

        memory context merged into its system entry. This preserves

        ``tools``, ``tool_choice``, ``tool_calls``, ``tool_call_id``, ``name``,

        ``response_format``, ``parallel_tool_calls``, and any future OpenAI-spec

        field without code changes (ADR-024).


        No ``@log_call`` decorator on purpose — the streaming generator is

        consumed *after* this function returns, so a context-manager span here

        would close before the generator ran. The explicit ``@observe`` on

        ``_build_memory_context_with_trace`` owns the request span instead.'
      operationId: chat_completions_v1_chat_completions_post
      responses:
        '200':
          content:
            application/json:
              schema:
                title: Response Chat Completions V1 Chat Completions Post
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Chat Completions
      tags:
      - chat
  /v1/models:
    get:
      description: 'Proxy GET /v1/models to llama-server.


        OpenAI-compatible clients (OpenCode, Continue) call this to discover

        available models before sending chat completions.'
      operationId: list_models_v1_models_get
      responses:
        '200':
          content:
            application/json:
              schema:
                title: Response List Models V1 Models Get
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Models
      tags:
      - chat
tags:
- description: 'OpenAI-compatible chat completions proxy. The default POST shape is intentionally permissive (raw dict pass-through)
    per ADR-024 to preserve unknown tool-calling fields. Memory augmentation is merged into the system message; an opt-in
    ``X-Persist-Mode: async`` header (ADR-046) routes the audit-row write through Redis Streams instead of the synchronous
    Postgres write on the response path.'
  name: chat
- description: Build the augmented system context across all four memory layers (episodic, procedural, conversational, semantic)
    without going through chat completions. Used by the webui memory tab and by external agents that want to inspect what
    would be injected.
  name: context
- description: CRUD over the four memory layers. Episodic = ADRs, Procedural = skill files, Conversational = past sessions
    (read-only), Semantic = ChromaDB-backed RAG. Each write is scoped to the caller's Keycloak ``sub`` and gated by RLS at
    the Postgres + ChromaDB layers.
  name: memory
- description: Save + summarise full chat sessions for replay and audit. Used by the OpenCode bridge to land long-running
    conversations into the conversational layer.
  name: session
- description: 'Read-only audit endpoints: ``/interactions`` returns every chat-completion row with token counts, status,
    failure-class, and trace_id; ``/sessions`` aggregates them by session. EU-AI-Act Article 12 compliance hook.'
  name: audit
- description: Kubernetes-grade liveness + metrics endpoints. ``/health`` surfaces the summariser ctx-window and async-persist
    runtime state alongside the standard component checks.
  name: health
