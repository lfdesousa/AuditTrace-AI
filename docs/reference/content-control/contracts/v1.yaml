# audittrace-content-control — cross-repo interface contract v1.0
#
# VENDORED COPY — canonical source lives at
# https://github.com/lfdesousa/audittrace-content-control
# in `contracts/v1.yaml`. Placeholder published in PR-B1 (this repo);
# real shape lands when PR-A1 in the audittrace-content-control repo
# publishes v1.0. PR-B4 in this repo asserts (via snapshot test) that
# memory-server's verdict-consumer Pydantic model + the producer code
# in routes/memory.py for the scan-request stream entry match this
# vendored copy.
#
# Update gate: `CONTRACT_SNAPSHOT_UPDATE=1 pytest
# tests/test_content_control_contract.py` regenerates from the
# upstream repo's v1.yaml. Updates that touch the schema are
# paired-PR moments (this repo + audittrace-content-control).
#
# Diagram cross-reference:
# - docs/architecture/workspace.dsl (this repo) — content-control as
#   peer system at L1
# - audittrace-content-control/docs/architecture/workspace.dsl
#   (repo A) — full L1+L2+L3 + deployment views
# - audittrace-content-control/docs/architecture/class-diagram-*.md
#   (repo A) — Mermaid class diagrams for ports / adapters / factories

contract_version: "1.0-placeholder"

# ── HTTP surfaces (mTLS only, in-mesh) ─────────────────────────────────
# Real OpenAPI 3.1 fragment lands in PR-A1. Repo B's snapshot test
# vendors that fragment via this file. The five surfaces from
# ADR-048 §"Service interface contract":
#   POST /v1/scan         — sync RPC for waiting callers
#   GET  /v1/scan/status  — query state by object_uri or scan_id
#   POST /v1/scan/retrigger — admin force-rescan (audittrace:admin)
#   GET  /v1/scan/stats   — aggregated counts by verdict / scanner
#   GET  /v1/{health,ready,version} — standard ops
http:
  openapi: "3.1.0"
  info:
    title: "audittrace-content-control"
    version: "1.0-placeholder"
  paths: {}  # filled by PR-A1
  components:
    schemas:
      Verdict:
        type: object
        required: [scan_id, kind, scanner, signature_db_hash, scan_duration_ms, scan_ts]
        properties:
          scan_id:
            type: string
            format: uuid
          kind:
            type: string
            enum: [clean, rejected, scan_failed]
          scanner:
            type: string
            description: "name@version (e.g. 'clamav@1.3.1')"
          signature_db_hash:
            type: string
            description: "sha256: prefix"
          scan_duration_ms:
            type: integer
          threats:
            type: array
            items:
              $ref: "#/components/schemas/Threat"
          scan_ts:
            type: string
            format: date-time
      Threat:
        type: object
        required: [name]
        properties:
          name: { type: string }
          family: { type: string }
          confidence: { type: number, minimum: 0, maximum: 1 }
      SecurityAuditRow:
        type: object
        required: [scan_id, user_id, trace_id, event_class, verdict, scanner_name, scanner_version, signature_db_hash]
        properties:
          scan_id: { type: string, format: uuid }
          user_id: { type: string }
          trace_id: { type: string }
          event_class:
            type: string
            const: "security"
          verdict:
            type: string
            enum: [clean, rejected, scan_failed]
          scanner_name: { type: string }
          scanner_version: { type: string }
          signature_db_hash: { type: string }
          object_uri: { type: string }
          object_sha256: { type: string }
          object_size_bytes: { type: integer }
          original_filename: { type: string }
          claimed_content_type: { type: string }
          detected_content_type: { type: string }
          threat_name: { type: string }
          threat_family: { type: string }
          confidence: { type: number }

# ── Redis Stream surfaces (RESP3 over Istio mTLS) ──────────────────────
# Two streams + DLQ counterparts. Field-level schemas pin the
# producer/consumer contract on both sides of each repo boundary.
streams:
  scan_requests:
    name: "audittrace:scan:requests"
    consumer_group: "content-control"
    dlq: "audittrace:scan:requests:dlq"
    field_schema:
      $ref: "#/components/schemas/ScanRequestStreamEntry"
  scan_verdicts:
    name: "audittrace:scan:verdicts"
    consumer_group: "audittrace-verdict-consumers"
    dlq: "audittrace:scan:verdicts:dlq"
    field_schema:
      $ref: "#/components/schemas/VerdictStreamEntry"

components:
  schemas:
    ScanRequestStreamEntry:
      # Flat string→string fields per Redis Stream entry shape.
      # Mirrors async_persist.py:178–184 producer pattern.
      type: object
      required: [scan_id, object_uri, expected_content_type, user_id, trace_id, traceparent, enqueued_ts]
      properties:
        scan_id: { type: string, format: uuid }
        object_uri:
          type: string
          description: "s3://shared/quarantine/<user_id>/<uuid>/<filename>"
        expected_content_type:
          type: string
          description: "Claimed MIME type from /memory/upload caller"
        user_id: { type: string }
        trace_id: { type: string, description: "OTel trace_id (32-char hex)" }
        traceparent:
          type: string
          description: "W3C TraceContext header value"
        enqueued_ts: { type: string, format: date-time }
        scan_modes:
          type: string
          description: "Comma-separated subset of {malware, structure, classification}; default 'malware' for v1"
    VerdictStreamEntry:
      type: object
      required: [scan_id, verdict_json, metadata_json, enqueued_ts, trace_id]
      properties:
        scan_id: { type: string, format: uuid }
        verdict_json:
          type: string
          description: "JSON-encoded Verdict object (see #/components/schemas/Verdict)"
        metadata_json:
          type: string
          description: "JSON-encoded scanner metadata (scanner_name, scanner_version, signature_db_hash, scan_duration_ms)"
        trace_id: { type: string }
        traceparent: { type: string }
        enqueued_ts: { type: string, format: date-time }
