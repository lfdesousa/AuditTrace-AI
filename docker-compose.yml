# audittrace-stack — Docker Compose
#
# B7 step 1 (2026-05-15) — rebuilt from scratch to match the
# Helm chart's deployed posture:
#   * SAME images: ghcr-frozen Bitnami pg/redis/rabbitmq + upstream
#     chromadb/keycloak/minio/traefik. Compose now exercises the
#     exact bytes prod runs. Anchor: project_pickup_20260515_b7.
#   * SAME conventions: Bitnami env-vars (POSTGRESQL_*, REDIS_*,
#     RABBITMQ_*) + Bitnami volume paths (/bitnami/*).
#   * RabbitMQ added — required since v1.0.7 (scan_amqp_client
#     lifespan blocks without it).
#   * Network is compose-managed (no `external: true`).
#
# OPERATOR CAVEAT — WIPE VOLUMES ON FIRST UP AFTER B7 STEP 1:
#   The previous compose used vanilla `postgres:16-alpine` writing
#   to /var/lib/postgresql/data and `redis:7-alpine` with command-
#   line auth. Bitnami pins are PG 18.3 / Redis 8.6.2 (same binary
#   prod runs) and write to /bitnami/postgresql + /bitnami/redis/data.
#   The OLD volumes are incompatible. From a stopped stack:
#     docker compose down -v --remove-orphans
#   That clears postgres_data + audittrace_redis_data + chroma_data
#   + minio_data so the next `up` initialises against the new images
#   cleanly. Acceptable because compose is dev-only — k8s/Helm is
#   the canonical production path.

services:

  memory-server:
    # B7 step 1 — pin to the published multi-arch image (same image
    # prod pulls). Dev iteration via docker-compose.dev.yml overlay
    # which re-introduces `build: .` + bind-mounts /src for hot
    # reload. Override the tag for local dev builds with:
    #   AUDITTRACE_IMAGE_TAG=dev docker compose up -d
    image: docker.io/lfds/audittrace-memory-server:${AUDITTRACE_IMAGE_TAG:-1.0.22}
    container_name: audittrace-server
    entrypoint: ["/app/scripts/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - AUDITTRACE_CHROMA_URL=http://chromadb:8000
      - AUDITTRACE_CHROMA_TOKEN=${AUDITTRACE_CHROMA_TOKEN}
      # DESIGN §16 Phase 4 — connect as the non-superuser
      # `audittrace_app` role so Postgres RLS policies apply to the
      # hot path. `audittrace` superuser stays for admin tasks /
      # summariser RLS-bypass only. Init scripts under
      # scripts/init-audittrace-app-role.sh create the role on
      # first DB init.
      - AUDITTRACE_POSTGRES_URL=postgresql+psycopg2://audittrace_app:${AUDITTRACE_APP_PASSWORD:-${AUDITTRACE_POSTGRES_PASSWORD}}@postgres:5432/audittrace
      # B7 step 2 — LLM URL defaults flipped from host.docker.internal
      # (real llama-server on the dev box) to the in-compose `mock-llm`
      # service (Q1 decision: compose profiles). Operators with a
      # host-running llama-server set these env vars in their `.env` to
      # point at host.docker.internal, OR enable the `real-llm` profile
      # (future B7 step). Mock-llm satisfies /v1/models +
      # /v1/chat/completions + /health with canned responses.
      - AUDITTRACE_LLAMA_URL=${AUDITTRACE_LLAMA_URL:-http://mock-llm:11435/v1}
      - AUDITTRACE_EMBED_URL=${AUDITTRACE_EMBED_URL:-http://mock-llm:11435/v1}
      - AUDITTRACE_SUMMARIZER_URL=${AUDITTRACE_SUMMARIZER_URL:-http://mock-llm:11435/v1}
      - AUDITTRACE_SUMMARIZER_MODEL=${AUDITTRACE_SUMMARIZER_MODEL:-audittrace-default}
      - AUDITTRACE_SUMMARIZER_ENABLED=${AUDITTRACE_SUMMARIZER_ENABLED:-true}
      - AUDITTRACE_SUMMARIZER_IDLE_MINUTES=${AUDITTRACE_SUMMARIZER_IDLE_MINUTES:-15}
      - AUDITTRACE_SUMMARIZER_INTERVAL_MINUTES=${AUDITTRACE_SUMMARIZER_INTERVAL_MINUTES:-5}
      - AUDITTRACE_SUMMARIZER_MAX_PER_CYCLE=${AUDITTRACE_SUMMARIZER_MAX_PER_CYCLE:-10}
      - AUDITTRACE_SUMMARIZER_POSTGRES_URL=postgresql+psycopg2://audittrace:${AUDITTRACE_POSTGRES_PASSWORD}@postgres:5432/audittrace
      # ADR-057 scan-control AMQP broker. Lifespan calls
      # scan_amqp_client.ensure_connected() — without rabbitmq the
      # pod crash-loops. PR #84 startupProbe handles slow connect.
      - AUDITTRACE_SCAN_AMQP_URL=amqp://audittrace:${AUDITTRACE_RABBITMQ_PASSWORD}@rabbitmq:5672/
      - AUDITTRACE_RABBITMQ_PASSWORD=${AUDITTRACE_RABBITMQ_PASSWORD}
      - AUDITTRACE_SCAN_PIPELINE_ENABLED=${AUDITTRACE_SCAN_PIPELINE_ENABLED:-true}
      - AUDITTRACE_SCAN_REQUEST_EXCHANGE=${AUDITTRACE_SCAN_REQUEST_EXCHANGE:-audittrace.scan}
      - AUDITTRACE_SCAN_REQUEST_ROUTING_KEY=${AUDITTRACE_SCAN_REQUEST_ROUTING_KEY:-scan.request.new}
      # ADR-028 OTLP export — wired ONLY when the obs profile runs;
      # otel-collector service is in a future B7 step.
      - AUDITTRACE_OTLP_ENDPOINT=${AUDITTRACE_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=audittrace-server
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=audittrace,service.version=${AUDITTRACE_IMAGE_TAG:-1.0.22},deployment.environment=${AUDITTRACE_ENV:-local}
      - OTEL_SEMCONV_STABILITY_OPT_IN=${OTEL_SEMCONV_STABILITY_OPT_IN:-http/dup}
      - AUDITTRACE_METRICS_ENABLED=${AUDITTRACE_METRICS_ENABLED:-true}
      - AUDITTRACE_LANGFUSE_HOST=${AUDITTRACE_LANGFUSE_HOST:-http://langfuse-web:3000}
      - AUDITTRACE_LANGFUSE_PUBLIC_KEY=${AUDITTRACE_LANGFUSE_PUBLIC_KEY:-}
      - AUDITTRACE_LANGFUSE_SECRET_KEY=${AUDITTRACE_LANGFUSE_SECRET_KEY:-}
      - AUDITTRACE_LANGFUSE_ENABLED=${AUDITTRACE_LANGFUSE_ENABLED:-false}
      - AUDITTRACE_LOG_LEVEL=${AUDITTRACE_LOG_LEVEL:-INFO}
      - AUDITTRACE_AUTH_ENABLED=${AUDITTRACE_AUTH_ENABLED:-true}
      - AUDITTRACE_LLAMA_PROXY_TIMEOUT=${AUDITTRACE_LLAMA_PROXY_TIMEOUT:-300}
      - AUDITTRACE_LLAMA_CHUNK_TIMEOUT=${AUDITTRACE_LLAMA_CHUNK_TIMEOUT:-120}
      - AUDITTRACE_SSE_KEEPALIVE_INTERVAL=${AUDITTRACE_SSE_KEEPALIVE_INTERVAL:-15}
      - AUDITTRACE_AUTH_REQUIRED=${AUDITTRACE_AUTH_REQUIRED:-true}
      - AUDITTRACE_KEYCLOAK_ISSUER=http://keycloak:8080/realms/audittrace
      - AUDITTRACE_KEYCLOAK_JWKS_URL=http://keycloak:8080/realms/audittrace/protocol/openid-connect/certs
      - AUDITTRACE_KEYCLOAK_ISSUER_EXTRAS=["http://localhost/realms/audittrace","https://localhost/realms/audittrace"]
      - AUDITTRACE_JWT_AUDIENCE=audittrace-server
      - AUDITTRACE_REDIS_URL=redis://redis:6379/0
      - AUDITTRACE_REDIS_PASSWORD=${AUDITTRACE_REDIS_PASSWORD}
      - AUDITTRACE_TOKEN_CACHE_TTL_SECONDS=${AUDITTRACE_TOKEN_CACHE_TTL_SECONDS:-300}
      - AUDITTRACE_MEMORY_MODE=${AUDITTRACE_MEMORY_MODE:-inject}
      - AUDITTRACE_MEMORY_TOOL_LOOP_MAX_ITERATIONS=${AUDITTRACE_MEMORY_TOOL_LOOP_MAX_ITERATIONS:-5}
      - AUDITTRACE_MEMORY_TOOL_CACHE_TTL_SECONDS=${AUDITTRACE_MEMORY_TOOL_CACHE_TTL_SECONDS:-900}
      - AUDITTRACE_TOOLS_CONFIG_PATH=${AUDITTRACE_TOOLS_CONFIG_PATH:-tools.toml}
      - AUDITTRACE_MINIO_URL=http://minio:9000
      - AUDITTRACE_MINIO_ACCESS_KEY=${AUDITTRACE_MINIO_ACCESS_KEY:-minioadmin}
      - AUDITTRACE_MINIO_SECRET_KEY=${AUDITTRACE_MINIO_SECRET_KEY}
      - AUDITTRACE_MINIO_SHARED_BUCKET=${AUDITTRACE_MINIO_SHARED_BUCKET:-memory-shared}
      - AUDITTRACE_MINIO_PRIVATE_BUCKET=${AUDITTRACE_MINIO_PRIVATE_BUCKET:-memory-private}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=audittrace-net"
      - "traefik.http.routers.memory.rule=PathPrefix(`/`)"
      - "traefik.http.routers.memory.entrypoints=websecure"
      - "traefik.http.routers.memory.tls=true"
      - "traefik.http.services.memory.loadbalancer.server.port=8765"
    networks:
      - audittrace-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    # B7 step 1 — Bitnami PG 18.3 (same binary prod runs). The tag
    # `17.6.0-...` is mislabelled and ships PG 18.3 — see
    # `project_bitnami_systemic_tag_mislabel`. Our ghcr-frozen
    # mirror (B1.5) preserves the moment-in-time bytes so CI / kind /
    # prod / compose all run the SAME binary.
    image: ghcr.io/lfdesousa/audittrace-postgresql:18.3-bitnami-frozen-apr17
    container_name: audittrace-postgres
    ports:
      - "15432:5432"
    environment:
      # Bitnami conventions (NOT vanilla POSTGRES_*) — same env
      # surface the Bitnami subchart wires in prod. The user-config
      # role `audittrace_app` is created post-init by the script
      # mounted below.
      POSTGRESQL_DATABASE: audittrace
      POSTGRESQL_USERNAME: audittrace
      POSTGRESQL_PASSWORD: ${AUDITTRACE_POSTGRES_PASSWORD}
      # Superuser password — bitnami separates the `postgres` role's
      # password from the application role's. Set to the same value
      # for compose-simplicity; prod Vault-derives them separately.
      POSTGRESQL_POSTGRES_PASSWORD: ${AUDITTRACE_POSTGRES_PASSWORD}
      # Passed through to init-audittrace-app-role.sh
      AUDITTRACE_APP_PASSWORD: ${AUDITTRACE_APP_PASSWORD:-${AUDITTRACE_POSTGRES_PASSWORD}}
    volumes:
      # Bitnami path (was /var/lib/postgresql/data on vanilla). The
      # `postgres_data` named volume name is preserved; new image
      # initialises it from scratch on first up.
      - postgres_data:/bitnami/postgresql
      # Bitnami's postgres image runs `/docker-entrypoint-initdb.d/*.sh`
      # AFTER the cluster is initialised — same convention as vanilla.
      - ./scripts/init-keycloak-db.sql:/docker-entrypoint-initdb.d/01-init-keycloak-db.sql:ro
      - ./scripts/init-audittrace-app-role.sh:/docker-entrypoint-initdb.d/02-init-audittrace-app-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audittrace -d audittrace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - audittrace-net
    restart: unless-stopped

  chromadb:
    # Chart's chromadb is in-chart (not a subchart). Pin matches
    # `charts/audittrace/values.yaml::chromadb.image.tag`.
    image: chromadb/chroma:1.5.7
    container_name: audittrace-chromadb
    ports:
      - "18000:8000"
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${AUDITTRACE_CHROMA_TOKEN}
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - audittrace-net
    restart: unless-stopped

  keycloak:
    # Chart-aligned (quay.io/keycloak/keycloak:24.0 — already
    # matched pre-B7; preserved here).
    image: quay.io/keycloak/keycloak:24.0
    container_name: audittrace-keycloak
    command: start-dev --import-realm --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: audittrace
      KC_DB_PASSWORD: ${AUDITTRACE_POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_URL: https://localhost
      KC_HOSTNAME_ADMIN_URL: https://localhost
      KC_PROXY: edge
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q 200 <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - ./keycloak/realm-audittrace.json:/opt/keycloak/data/import/realm.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/realms`) || PathPrefix(`/admin`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - audittrace-net
    restart: unless-stopped

  redis:
    # B7 step 1 — Bitnami Redis 8.6.2 (same binary prod runs; the
    # `7.2.5-...` tag is mislabelled per the systemic Bitnami forensic
    # — see `project_bitnami_systemic_tag_mislabel`). ghcr-frozen
    # mirror (B1.5) preserves the bytes.
    image: ghcr.io/lfdesousa/audittrace-redis:8.6.2-bitnami-frozen-apr17
    container_name: audittrace-redis
    # Bitnami's redis image takes config via env vars (not via
    # `--requirepass` on a command). REDIS_AOF_ENABLED=no makes the
    # token cache ephemeral by design (was `--appendonly no`).
    environment:
      REDIS_PASSWORD: ${AUDITTRACE_REDIS_PASSWORD}
      REDIS_AOF_ENABLED: "no"
      REDIS_DISABLE_COMMANDS: ""
      # 256 MB cap matches the previous --maxmemory; bitnami exposes
      # this via REDIS_EXTRA_FLAGS so we can pass arbitrary flags
      # without overriding the wrapper.
      REDIS_EXTRA_FLAGS: "--maxmemory 256mb --maxmemory-policy allkeys-lru"
    volumes:
      # Bitnami path (was /data on vanilla).
      - audittrace_redis_data:/bitnami/redis/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audittrace-net
    restart: unless-stopped

  rabbitmq:
    # B7 step 1 round 7 — PLAN-B switch to upstream rabbitmq image.
    #
    # Background: rounds 3b through 6 all tried to disable bitnami's
    # default loopback restriction for RABBITMQ_USERNAME (env vars,
    # RABBITMQ_EXTRA_CONF appends, mounted rabbitmq.conf at the
    # documented override path). None took effect — the bitnami image
    # writes `loopback_users.<RABBITMQ_USERNAME> = true` after our
    # overrides and wins. Empirical evidence: 4 consecutive CI runs
    # against bitnami all failed at the same AMQP login step.
    #
    # Trade-off accepted: deviate from Luis's "exact same images" steer
    # for compose's rabbitmq only. The BINARY is identical (RabbitMQ
    # 3.13.7 — verified pre-B1.6 via `rabbitmqctl version` against the
    # cluster's bitnami pod). Only the wrapper image differs. Upstream
    # rabbitmq:3.13-management-alpine has straightforward env-var
    # conventions (RABBITMQ_DEFAULT_USER/PASS) and no
    # loopback-by-default behaviour. The chart keeps bitnami for prod;
    # compose deviates here as a dev-runtime pragmatic compromise.
    #
    # Anchor: project_pickup_20260515_b7. Flag this for Luis's review
    # — if he prefers we keep bitnami at any cost, we'd need to step
    # back and audit the bitnami libfile source to find the missing
    # override hook (or fork the image).
    image: rabbitmq:3.13-management-alpine
    container_name: audittrace-rabbitmq
    environment:
      # Upstream conventions: RABBITMQ_DEFAULT_USER/PASS/VHOST.
      # No loopback restriction on these by default.
      RABBITMQ_DEFAULT_USER: audittrace
      RABBITMQ_DEFAULT_PASS: ${AUDITTRACE_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
      # Deterministic cookie so a `docker compose down` + `up` (which
      # keeps the volume) doesn't break clustering.
      RABBITMQ_ERLANG_COOKIE: ${AUDITTRACE_RABBITMQ_ERLANG_COOKIE:-audittrace-compose-cookie}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # mgmt UI (dev only)
    volumes:
      # Upstream path (was /bitnami/rabbitmq/mnesia on the bitnami image).
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - audittrace-net
    restart: unless-stopped

  minio:
    # ADR-027 — S3-compatible storage. Chart pin is `minio/minio:latest`
    # (upstream — NOT bitnami). Preserved here so compose matches.
    image: minio/minio:latest
    container_name: audittrace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AUDITTRACE_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AUDITTRACE_MINIO_SECRET_KEY}
      MINIO_KMS_SECRET_KEY: "audittrace-key:${AUDITTRACE_MINIO_KMS_KEY}"
    volumes:
      - minio_data:/data
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audittrace-net
    restart: unless-stopped

  mock-llm:
    # B7 step 2 (2026-05-15) — in-compose mock LLM under the
    # `mock-llm` profile. Mirrors the kind-CI mock (tests/integration/
    # fixtures/mock-llm-{configmap,deployment,service}.yaml) so compose
    # + kind exercise the SAME mock contract: /v1/models +
    # /v1/chat/completions (returns content="bruno", finish_reason=
    # "stop") + /health. The Python source is duplicated (NOT
    # symlinked — Q6 decision) and asserted byte-identical by
    # tests/test_compose_drift.py::TestMockLlmScriptParity.
    #
    # Profile gating: this service ONLY runs under the `mock-llm`
    # profile. Default `docker compose up -d` leaves it dormant
    # (operators with host llama-server want this). Activate with:
    #   docker compose --profile mock-llm up -d
    # OR set COMPOSE_PROFILES=mock-llm in the .env.
    image: python:3.12-slim
    container_name: audittrace-mock-llm
    profiles: ["mock-llm", "ci"]
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./tests/integration/fixtures/compose/mock-llm/server.py:/app/server.py:ro
    # Install fastapi/uvicorn once, then serve the mounted script.
    # Mirrors the kind Deployment's args (mock-llm-deployment.yaml).
    # Boot time on a cold runner: ~10s for pip install, ~2s for
    # uvicorn ready. Pinned versions match the kind fixture so the
    # two paths produce byte-identical responses.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        pip install --quiet --no-cache-dir 'fastapi==0.115.0' 'uvicorn[standard]==0.32.0'
        exec uvicorn server:app --app-dir=/app --host=0.0.0.0 --port=11435
    networks:
      - audittrace-net
    expose:
      - "11435"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:11435/health',timeout=2).status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  # ─── B7 step 6 — Vault dev-mode (profile: vault) ─────────────────
  # Hashicorp Vault in dev mode: auto-unsealed, in-memory storage,
  # root token printed at startup. memory-server in compose does NOT
  # talk to Vault (it reads creds directly from .env via compose env
  # substitution). This service exists for OPERATORS who want to
  # exercise the Vault Agent injection flow locally — e.g. ahead of
  # a prod chart upgrade that adds a Vault-rendered Secret.
  # See AGENTS.md "docker-compose stack — B7 step 1 rebuild" for the
  # full compose-vs-helm posture rationale.
  vault:
    image: hashicorp/vault:1.20.1
    container_name: audittrace-vault
    profiles: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${AUDITTRACE_VAULT_DEV_TOKEN:-audittrace-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8200/v1/sys/health || true"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audittrace-net
    restart: unless-stopped

  # ─── B7 step 7 — Observability stack (profile: obs) ──────────────
  # otel-collector + tempo + loki + grafana. Opt-in via
  # COMPOSE_PROFILES=obs (Q4 decision: off in CI by default — saves
  # ~3 GB RAM per PR run for a property already tested in chart+kind).
  # Operators who want local dashboards bring this up and then set
  # AUDITTRACE_OTLP_ENDPOINT=http://otel-collector:4318 in their .env.
  # Config files committed under config/compose/{otel-collector,tempo,
  # loki,grafana}/ — minimum-viable single-binary configs.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: audittrace-otel-collector
    profiles: ["obs"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/compose/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
    networks:
      - audittrace-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: audittrace-tempo
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/compose/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"  # tempo HTTP (TraceQL search UI proxied via Grafana)
    networks:
      - audittrace-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: audittrace-loki
    profiles: ["obs"]
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./config/compose/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - audittrace-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: audittrace-grafana
    profiles: ["obs"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${AUDITTRACE_GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./config/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
    networks:
      - audittrace-net
    restart: unless-stopped

  # ─── B7 step 8 — Langfuse (profile: langfuse) ────────────────────
  # Langfuse-web + a dedicated postgres for langfuse's own data
  # (NOT shared with audittrace's main pg). Heavy — opt-in only.
  langfuse-postgres:
    image: ghcr.io/lfdesousa/audittrace-postgresql:18.3-bitnami-frozen-apr17
    container_name: audittrace-langfuse-postgres
    profiles: ["langfuse"]
    environment:
      POSTGRESQL_DATABASE: langfuse
      POSTGRESQL_USERNAME: langfuse
      POSTGRESQL_PASSWORD: ${AUDITTRACE_LANGFUSE_DB_PASSWORD:-langfuse-dev-password}
      POSTGRESQL_POSTGRES_PASSWORD: ${AUDITTRACE_LANGFUSE_DB_PASSWORD:-langfuse-dev-password}
    volumes:
      - langfuse_postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - audittrace-net
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:2
    container_name: audittrace-langfuse-web
    profiles: ["langfuse"]
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${AUDITTRACE_LANGFUSE_DB_PASSWORD:-langfuse-dev-password}@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${AUDITTRACE_LANGFUSE_NEXTAUTH_SECRET:-langfuse-dev-nextauth-secret-32chars-min!!}
      SALT: ${AUDITTRACE_LANGFUSE_SALT:-langfuse-dev-salt-32chars-min-padding!!}
      TELEMETRY_ENABLED: "false"
    ports:
      - "13000:3000"   # langfuse web UI (mapped off-3000 to avoid grafana clash)
    networks:
      - audittrace-net
    restart: unless-stopped

  # ─── B7 step 9 — Content-control sibling (profile: content-control) ─
  # cc-control-plane consumes scan.requests from RabbitMQ, scans via
  # clamd, publishes verdicts back. Same image the chart deploys at
  # docker.io/lfds/audittrace-content-control:0.0.9 (multi-arch from
  # cc-side PR-A14). clamd is the malware scanner — ≥1 GB RAM floor
  # per the PR-A11 OOMKill forensic; profile-only because of cost.
  cc-clamd:
    image: clamav/clamav:1.4
    container_name: audittrace-cc-clamd
    profiles: ["content-control"]
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # clamd DB load is slow on first boot
    networks:
      - audittrace-net
    restart: unless-stopped

  cc-control-plane:
    image: docker.io/lfds/audittrace-content-control:0.0.9
    container_name: audittrace-cc-control-plane
    profiles: ["content-control"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      cc-clamd:
        condition: service_healthy
    environment:
      # cc reads CONTENT_CONTROL_* env vars per ADR-048
      CONTENT_CONTROL_RABBITMQ_HOST: rabbitmq
      CONTENT_CONTROL_RABBITMQ_USER: ${AUDITTRACE_CC_RABBITMQ_USER:-content-control}
      CONTENT_CONTROL_RABBITMQ_PASSWORD: ${AUDITTRACE_CC_RABBITMQ_PASSWORD:-cc-dev-password}
      CONTENT_CONTROL_MINIO_ENDPOINT: minio:9000
      CONTENT_CONTROL_MINIO_ACCESS_KEY: ${AUDITTRACE_CC_MINIO_ACCESS_KEY:-${AUDITTRACE_MINIO_ACCESS_KEY:-minioadmin}}
      CONTENT_CONTROL_MINIO_SECRET_KEY: ${AUDITTRACE_CC_MINIO_SECRET_KEY:-${AUDITTRACE_MINIO_SECRET_KEY}}
      CONTENT_CONTROL_CLAMD_HOST: cc-clamd
      CONTENT_CONTROL_CLAMD_PORT: "3310"
    networks:
      - audittrace-net
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    container_name: audittrace-traefik
    ports:
      - "443:443"
      - "8080:8080"
    environment:
      - DOCKER_API_VERSION=1.40
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - audittrace-net
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  audittrace_redis_data:
  rabbitmq_data:
  minio_data:
  # B7 step 7 — obs profile
  tempo_data:
  loki_data:
  grafana_data:
  # B7 step 8 — langfuse profile
  langfuse_postgres_data:

networks:
  # B7 step 1 — compose-managed (was `external: true`). The
  # previous posture required an out-of-band `docker network create
  # audittrace-net` before `compose up`. Now `compose up` provisions
  # the network itself; `compose down` cleans it up. Operators who
  # need to bridge into an existing network can override with a
  # `docker-compose.network-external.yaml` overlay.
  audittrace-net:
    name: audittrace-net
