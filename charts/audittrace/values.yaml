# =============================================================================
# AuditTrace-AI — Helm values
# =============================================================================
#
# ⚠️  SECURITY NOTICE — rotate all credentials before any production deploy.
# ---------------------------------------------------------------------------
# The `secrets.*` block at the bottom of this file is empty-by-default for
# a reason: development installs commonly use the throwaway values below,
# baked into repository test fixtures:
#
#   postgres.password                test-pg-pass
#   postgres.appPassword             test-pg-pass
#   summariser.password              test-summariser-pw
#   chromadb.token                   test-chroma-token
#   redis.password                   test-redis-pass
#   minio.secretKey                  test-minio-key
#   minio.kmsKey                     (dev-generated, committed for repeatability)
#   keycloak.adminPassword           admin
#
# These strings appear in git history across `test-*` values files, chart
# test fixtures, and this repository's CI workflow (`.github/workflows/
# ci.yml`). They are safe in the local / dev context they're intended for;
# they are unacceptable in any production cluster.
#
# Before any production install:
#   1. Set `global.productionMode: true` below — the chart will refuse to
#      render if ANY secret equals a known dev default.
#   2. Provision all `secrets.*` values from your enterprise secret manager
#      (Vault via External Secrets Operator, SOPS, Sealed Secrets, or CSI
#      Secrets Store driver). Roadmap Phase 1.1 will ship first-class Vault
#      integration (ADR-040 candidate, target 2026-05-16).
#   3. Review `memoryServer.env.AUDITTRACE_LANGFUSE_PUBLIC_KEY` and the
#      matching secret key — the dev defaults point at the local Langfuse
#      instance; production must re-issue keys per tenant.
#
# This notice exists because regulated-industry security reviewers flag
# credentials in git-history within 90 seconds of opening the repo.
# Closing the gap visibly — with a production-mode gate enforced at
# `helm template` time, not just a comment — is part of the stability
# posture. See `audittrace.assertProductionSecrets` in
# `templates/_helpers.tpl`.
# ---------------------------------------------------------------------------

# -- Global -------------------------------------------------------------------
global:
  namespace: audittrace
  # Set to true for production deploys. When true, the chart refuses to
  # render if any `secrets.*` value matches a known dev default. See the
  # SECURITY NOTICE above.
  productionMode: false

# -- Memory Server (our app) -------------------------------------------------
memoryServer:
  # Production default = 3 (HA, one per AZ via topologySpreadConstraints in the
  # deployment template). Single-node dev / laptop k3s + CI override with
  # `--set memoryServer.replicaCount=1` (ScheduleAnyway makes 3-on-1-node safe).
  replicaCount: 3
  image:
    # Published by .github/workflows/publish.yml on every v*.*.* tag —
    # multi-arch (linux/amd64,linux/arm64). Operators with an internal
    # mirror or local-registry workflow override `repository` per-deploy
    # (e.g. localhost:5000 for the dev `kind` cluster).
    repository: docker.io/lfds/audittrace-memory-server
    # Empty default → chart template uses .Chart.AppVersion. Bumping
    # the chart's appVersion auto-tracks the matching image without
    # operators having to remember to bump tag in lockstep. Same B6
    # pattern as cc-repo's chart. Override with --set
    # memoryServer.image.tag=<explicit> to pin to a specific build.
    tag: ""
    # IfNotPresent is now safe because the default tag is the immutable
    # release version (chart's appVersion), not "latest". Operators who
    # explicitly --set image.tag=latest should also flip pullPolicy back
    # to Always — same 2026-04-18 trap.
    pullPolicy: IfNotPresent
  summariser:
    # When true, a post-install/post-upgrade Helm hook provisions a
    # dedicated, minimum-privilege `audittrace_summariser` role with
    # BYPASSRLS — needed for the cross-user scan over `interactions`
    # in the session-summariser loop (ADR-026 §RLS posture,
    # ADR-030 §Summariser). Set to false when you run your own
    # role management externally (Terraform, dbmate, etc.).
    manageRole: true
    # The summariser reads interactions cross-user and writes sessions
    # back. It has no grants on tool_calls. Role name is fixed to
    # keep the Job's SQL self-consistent; override only if you need
    # multiple chart installs in one DB.
    roleName: audittrace_summariser
  trustStore:
    # ADR-052 §5 — Helm post-install / post-upgrade hook that hits
    # POST /system/trust-store/refresh once after deploy. Default
    # FALSE because the hook needs a service-account JWT with the
    # `audittrace:admin` scope, which the operator must provision
    # ahead of time (a k8s Secret named ``<release>-trust-store-
    # refresh-creds`` with keys ``client_id``, ``client_secret``).
    # Until that is provisioned, set this to false and run the
    # refresh manually:
    #
    #     audittrace-login --scope audittrace:admin
    #     curl -H "Authorization: Bearer $(< ~/.audittrace/token)" \
    #       -X POST https://audittrace.local/system/trust-store/refresh
    #
    # Air-gapped customers using StaticTrustStoreBuilder + a vendored
    # PEM directory can also leave this off and run their own
    # provisioning path.
    bootstrap:
      enabled: false
      # Secret name holding service-account credentials for the
      # bootstrap Job. Keys: `client_id`, `client_secret`.
      credentialsSecret: ""
  serviceAccount:
    create: true
    name: memory-server
    # Annotations applied to the memory-server ServiceAccount. Empty
    # default keeps in-cluster MinIO deployments unaffected. When
    # objectStorage.backend=aws, the operator MUST set:
    #   annotations:
    #     eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role>
    # so the EKS IRSA webhook resolves boto3's default credential
    # chain to STS-via-AssumeRoleWithWebIdentity. Deployment-side
    # Terraform late-binds the role ARN through values overlay so the
    # chart doesn't hardcode account numbers. ADR-006 §Deployment-side.
    annotations: {}
  port: 8765
  resources:
    requests:
      # Re-baselined post-ADR-047 (#334). ADR-047 moved embedding to the
      # nomic server, so the memory-server no longer loads an in-process
      # embedding model (onnxruntime + MiniLM retired). Over 7 days of
      # real operation — spanning the full _v2 re-index (1272 chunks, the
      # heaviest ingest workload) — the container's cgroup high-water mark
      # was 241 MiB (idle ~189 MiB). Requests dropped from 500m/512Mi to
      # reserve closer to the real working set so more replicas pack per
      # node (feeds #296 g6e sizing); kept comfortably above the 241 MiB
      # observed peak.
      cpu: 250m
      memory: 320Mi
    limits:
      cpu: 1000m
      # 1 GiB ceiling (was 4 GiB). The 4 GiB was provisioned solely for
      # the in-process MiniLM OOM (2 GiB OOMKilled /memory/index, exit
      # 137). ADR-047 removed the in-process embedder entirely, so that
      # OOM class is structurally impossible: chunk vectors are computed
      # on the nomic server (embed_via_nomic) and supplied explicitly —
      # ChromaDB never embeds client-side. Post-ADR-047 peak working set
      # during one PDF is bounded by pymupdf's parse-tree (≤19 MiB seen)
      # plus orchestration. 1 GiB is 4.2× the observed 7-day peak.
      # Re-evaluate only if a synchronous in-process embed path returns.
      memory: 1Gi
  env:
    AUDITTRACE_ENV: "local"
    AUDITTRACE_HOST: "0.0.0.0"
    AUDITTRACE_PORT: "8765"
    AUDITTRACE_WORKERS: "1"
    AUDITTRACE_LOG_LEVEL: "INFO"
    AUDITTRACE_AUTH_ENABLED: "true"
    AUDITTRACE_AUTH_REQUIRED: "true"
    AUDITTRACE_MEMORY_MODE: "tools"
    AUDITTRACE_MEMORY_TOOL_LOOP_MAX_ITERATIONS: "10"
    AUDITTRACE_MEMORY_TOOL_CACHE_TTL_SECONDS: "900"
    AUDITTRACE_TOKEN_CACHE_TTL_SECONDS: "300"
    AUDITTRACE_LLAMA_PROXY_TIMEOUT: "300"
    # 600s = 10 min: accommodates first-token delay on 27B Q4 + consumer
    # GPU where prompt eval for OpenCode's tool-laden ~5K-token prompt
    # exceeds 120s. ADR-034: idle timer resets per chunk, so this only
    # bounds initial prompt eval + any genuine upstream hang.
    AUDITTRACE_LLAMA_CHUNK_TIMEOUT: "600"
    AUDITTRACE_SSE_KEEPALIVE_INTERVAL: "15"
    # AUDITTRACE_MINIO_SHARED_BUCKET + AUDITTRACE_MINIO_PRIVATE_BUCKET
    # moved to objectStorage.minio.{sharedBucket,privateBucket} so they
    # only render when objectStorage.backend=minio. When backend=aws,
    # AUDITTRACE_AWS_BUCKET takes their place — see objectStorage below.
    AUDITTRACE_TOOLS_CONFIG_PATH: "tools.toml"
    # CORS allowed-origins for the FastAPI middleware. JSON array literal —
    # parsed by pydantic-settings into ``list[str]``. Empty list disables
    # CORS entirely (the production-safe default for BFF deployments).
    # Override per deployment to add the operator's webui / SPA origin.
    AUDITTRACE_CORS_ORIGINS: '["http://localhost:8765","http://localhost:3000"]'
    AUDITTRACE_METRICS_ENABLED: "true"
    AUDITTRACE_LANGFUSE_ENABLED: "true"
    # AUDITTRACE_LANGFUSE_HOST is injected by templates/memory-server/
    # deployment.yaml using global.hostNodeIP + observability.external.
    # langfusePort so it resolves correctly on any network. Do not add
    # it here.
    AUDITTRACE_LANGFUSE_PUBLIC_KEY: "pk-lf-b3fb3a7e-b447-41c3-941e-c798ac006c58"
    AUDITTRACE_LANGFUSE_SECRET_KEY: "sk-lf-507779bd-f2b9-4bd2-9e05-71361840c1ba"
    AUDITTRACE_SUMMARIZER_ENABLED: "true"
    AUDITTRACE_SUMMARIZER_MODEL: "mistral-7b-summarizer"
    AUDITTRACE_SUMMARIZER_IDLE_MINUTES: "15"
    AUDITTRACE_SUMMARIZER_INTERVAL_MINUTES: "5"
    AUDITTRACE_SUMMARIZER_MAX_PER_CYCLE: "10"
    # PAdES trust store (ADR-052). Provider = where the PEM lives;
    # Builder = where it comes from. Defaults: S3 + EU LOTL via
    # pyhanko[etsi]. Operators with non-default storage (Vault,
    # ConfigMap, ...) or non-default sourcing (Adobe AATL, static
    # PEM dir) override these values + provide the Provider/Builder
    # impl. ADR-052 §2 + §3.
    AUDITTRACE_PDF_TRUST_STORE_PROVIDER: "s3"
    # ADR-053 — default to "composite" with the EU LOTL +
    # Swiss federal TSL inner builders. Covers the EU + CH
    # jurisdictions in one bundle (the v1 default for
    # Swiss-located, EU-customer-serving deployments).
    AUDITTRACE_PDF_TRUST_STORE_BUILDER: "composite"
    AUDITTRACE_PDF_TRUST_STORE_COMPOSITE_BUILDERS: "eu_lotl,swiss_tsl"
    AUDITTRACE_PDF_TRUST_STORE_SWISS_TSLO_CERT_PATH: "/etc/audittrace/swiss-federal-tsl/CH-TL-cert.der"
    AUDITTRACE_PDF_TRUST_STORE_S3_KEY: "trust-store/eu-lotl-bundle.pem"
    # ── ADR-048 PR-B3..B8 — async scan pipeline runtime configuration ──
    # These 7 settings are the contract memory-server's lifespan reads
    # to wire the scan pipeline. Without them the publisher / janitor /
    # verdict consumer / audit consumer tasks never schedule.
    # AUDITTRACE_SCAN_AMQP_URL is constructed in
    # templates/memory-server/deployment.yaml (vault.enabled=false branch)
    # or exported by Vault Agent (vault.enabled=true branch); see the
    # vaultAnnotations.memoryServer helper.
    AUDITTRACE_SCAN_PIPELINE_ENABLED: "true"
    AUDITTRACE_SCAN_REQUEST_EXCHANGE: "audittrace.scan"
    # Must match the topology bootstrap Job's binding pattern
    # `scan.request.*` (templates/rabbitmq/job-amqp-topology-bootstrap.yaml).
    # Earlier value `scan.requested` (singular, no segment) silently
    # drops on the broker because no queue binding matches.
    AUDITTRACE_SCAN_REQUEST_ROUTING_KEY: "scan.request.new"
    AUDITTRACE_SCAN_QUARANTINE_PREFIX: "quarantine"
    AUDITTRACE_SCAN_PUBLISHER_DRAIN_INTERVAL_MS: "100"
    AUDITTRACE_SCAN_JANITOR_INTERVAL_SECONDS: "30"
    AUDITTRACE_SCAN_JANITOR_GRACE_SECONDS: "60"
    OTEL_SERVICE_NAME: "audittrace-server"
    OTEL_SEMCONV_STABILITY_OPT_IN: "http/dup"
    # OTEL_RESOURCE_ATTRIBUTES is templated in
    # ``templates/memory-server/deployment.yaml`` from
    # ``.Chart.AppVersion`` (ADR-055 §2). Removed from values.yaml
    # so operators cannot accidentally override the service.version
    # token to something stale — bumping pyproject + Chart.yaml is
    # the single source of truth.

# -- Object storage (ADR-006) ------------------------------------------------
# Backend selector for memory layers 1 + 2. Defaults to in-cluster MinIO
# so single-node / laptop deployments work out-of-the-box. AWS S3 (boto3
# via IRSA) is selected with objectStorage.backend=aws — the chart skips
# the MinIO StatefulSet / Service / bucket-init Job entirely and wires
# the memory-server's env to AWS_* settings instead. The in-tree MinIO
# subchart block (below at `minio:`) stays so backend=minio remains a
# zero-edit default. See ADR-006 + audittrace-object-storage v0.1.1.
objectStorage:
  # "minio" (default — in-cluster MinIO StatefulSet) or "aws" (boto3 against
  # AWS S3 or any S3-compatible endpoint). Anything else fails the
  # NOTES.txt assertion.
  backend: "minio"

  # MinIO-backend settings. Bucket names previously lived in
  # memoryServer.env; they moved here so the rendered Deployment only
  # carries them when backend=minio.
  minio:
    sharedBucket: "memory-shared"
    privateBucket: "memory-private"

  # AWS-backend settings. Required when backend=aws.
  aws:
    # Terraform-provisioned bucket name, e.g.
    # `audittrace-loadtest-objects-243107681235-eu-central-2`. ADR-006
    # §Deployment-side. Empty string + backend=aws fails the
    # NOTES.txt assertion to keep the error loud.
    bucket: ""
    # AWS region the bucket lives in (e.g. "eu-central-2"). Required
    # when backend=aws.
    region: ""
    # Optional S3-compatible endpoint override. Leave empty for AWS S3.
    # Set when targeting OVH Object Storage / MinIO-as-AWS / LocalStack.
    endpointUrl: ""
    # IRSA-native auth. boto3's default credential chain resolves
    # `AWS_WEB_IDENTITY_TOKEN_FILE` + `AWS_ROLE_ARN` automatically when
    # the EKS IRSA webhook injects them on pods carrying the
    # `eks.amazonaws.com/role-arn` ServiceAccount annotation (wired via
    # memoryServer.serviceAccount.annotations). No static keys needed
    # in production. ADR-006.
    useIRSA: true
    # Only used when useIRSA=false (out-of-EKS testing / LocalStack /
    # moto). Production deployments leave these empty; the operator
    # is responsible for delivering them via Vault Agent or external-
    # secrets if they ever flip useIRSA off.
    accessKeyId: ""
    secretAccessKey: ""

# -- External LLM (FQDN-resolved out-of-cluster host) ------------------------
# The chart renders one `Service kind=ExternalName` per port (chat / embed /
# summarizer), each aliasing `host` via cluster DNS. ExternalName Services
# return a CNAME at lookup time — the operator's DNS infrastructure (Route53
# in the cloud, CoreDNS rewrite / NodeHosts on a laptop) is responsible for
# resolving `host` to whatever runs llama.cpp. The chart never sees, embeds,
# nor falls back to a literal IP. See ADR-045 (FQDN-only).
externalLLM:
  # 2026-05-14 B4b — disable the ExternalName Services that bridge
  # to a host-running LLM when CI deploys its own in-cluster mock as
  # `<release>-llm-chat` (same name; kind has no host LLM). Default
  # `true` preserves prod posture; values-ci.yaml flips to false.
  enabled: true
  # Required when enabled=true. The FQDN under which the three llama-server
  # ports (chat / embed / summarizer) are reachable. The chart fails to
  # render if enabled=true and host is empty.
  # Examples:
  #   * cloud: audittrace-loadtest-llm.allaboutdata.eu  (NLB-TLS in front)
  #   * dev:   llm.audittrace.local                     (resolved via local CoreDNS rewrite)
  host: ""
  chat:
    name: llm-chat
    port: 11435
  embed:
    name: llm-embed
    port: 11436
  summarizer:
    name: llm-summarizer
    port: 11437

# -- LLM stub (in-cluster, wiring/integration tests only) ---------------------
# An in-cluster OpenAI-compatible stub that serves deterministic canned
# responses, so the memory-server proxy / auth / RLS / telemetry pipeline
# can be exercised end-to-end without a real llama-server or any GPU.
# One Deployment fronted by three Services (`<release>-llm-chat` / `-llm-embed`
# / `-llm-summarizer`) that shadow the same names the ExternalName Services
# would use — so memory-server's AUDITTRACE_LLAMA_URL / _EMBED_URL /
# _SUMMARIZER_URL resolve to the stub. Used by the kind integration test and
# the docker-compose `mock-llm` profile.
#
# MUST be paired with externalLLM.enabled=false (same Service names collide) —
# enforced by the audittrace.assertLlmStub guard. Never enable in production.
llmStub:
  enabled: false
  image:
    repository: docker.io/lfds/audittrace-llm-stub
    # Defaults to .Chart.Version when empty (the stub image is published
    # per chart release tag, not per appVersion).
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Istio --------------------------------------------------------------------
istio:
  enabled: true
  gateway:
    name: audittrace-gateway
    hosts:
      - "audittrace.local"
      - "localhost"
    credentialName: audittrace-tls
    port: 443
  mtls:
    mode: STRICT
  defaultDenyAll: true

# -- Observability ------------------------------------------------------------
observability:
  otelCollector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.102.0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  promtail:
    enabled: true
    image:
      repository: grafana/promtail
      tag: "2.9.5"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  external:
    # FQDN-only — the chart never falls back to an IP. The langfuse
    # ExternalName Service skips when langfuseHost is empty. The
    # otel-collector ConfigMap and the promtail ConfigMap skip when
    # their respective host fields are empty (the OTel pipeline is
    # rendered without the tempo exporter; promtail without the loki
    # client). Operators with no observability stack leave these empty.
    # See ADR-045 + ADR-028 amendment.
    langfuseHost: ""
    langfusePort: 3000
    tempoHost: ""
    tempoOtlpPort: 14318
    prometheusHost: ""
    prometheusPort: 19090
    lokiHost: ""
    lokiPort: 3100
    # scheme: URL scheme for telemetry egress to the obs stack
    # (tempo / loki / langfuse). Defaults to `http` for laptop dev
    # convenience (sibling docker-compose obs stack ships plain HTTP).
    # Cloud deployments where the obs stack sits behind a TLS-
    # terminating load balancer (e.g. AWS NLB with ACM cert, per
    # ADR-008) MUST override to `https`. mTLS inside the cluster is
    # Istio's job; this scheme governs the egress hop OUT of the
    # mesh to the obs perimeter. v1.4.0 burn: 2026-05-23 aws-loadtest
    # chart pods couldn't reach obs NLB on TLS listeners because
    # otel-collector + promtail + memory-server hardcoded http://.
    scheme: "http"

# -- TLS ----------------------------------------------------------------------
tls:
  createSecret: false
  secretName: audittrace-tls

# =============================================================================
# Subchart overrides
# =============================================================================

# Bitnami Docker Hub free-image sunset (August 2025) — pinned tags like
# `bitnami/rabbitmq:3.13.7-debian-12-r2` 404 on Docker Hub. Bitnami
# maintains the legacy images at `bitnamilegacy/*`; we redirect each
# subchart's `image.repository` (+ `volumePermissions.image.repository`
# + `metrics.image.repository`) to that namespace as the new default.
# Operators with their own registry mirror can override per the
# Bitnami `image.registry` / `image.repository` pattern.
# Anchor: project_bitnami_images_deprecated; lifted to chart default in
# Chart-A (2026-05-13) after PR-B10 trip-wired the prod exposure.

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  auth:
    database: audittrace
    username: audittrace
    password: ""
    postgresPassword: ""
  primary:
    initdb:
      scriptsConfigMap: "{{ .Release.Name }}-initdb"
    # Chart-B (2026-05-13): inject AUDITTRACE_APP_PASSWORD so the
    # initdb script's init-audittrace-app-role.sh creates the
    # audittrace_app role with the SAME password memory-server uses
    # in its connection URL (helper `audittrace.postgresAppUrl`).
    # Before this, the role was silently created with POSTGRES_PASSWORD
    # and connections diverged whenever `secrets.postgres.appPassword
    # != secrets.postgres.password`. Anchor:
    # project_postgres_app_password_wiring.
    #
    # The Secret name is fixed at `audittrace-postgres-app` because
    # Bitnami subchart values.yaml does not template Helm syntax —
    # the chart's release name is conventionally `audittrace` (see
    # AGENTS.md "Cluster operations"). When vault.enabled=true the
    # Secret is not rendered (see templates/postgres/secret-postgres-app.yaml);
    # operators using a Vault-managed credential should override this
    # block with a Vault Agent injection equivalent.
    extraEnvVars:
      - name: AUDITTRACE_APP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: audittrace-postgres-app
            key: password
            optional: true
    persistence:
      size: 10Gi
      storageClass: local-path
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  metrics:
    image:
      repository: bitnamilegacy/postgres-exporter

redis:
  enabled: true
  image:
    repository: bitnamilegacy/redis
  auth:
    password: ""
  architecture: standalone
  master:
    # Istio interception applies to all inbound ports by default. The
    # redis-exporter sidecar listens on 9121 for the host-side Prometheus
    # scrape via NodePort 30921 — that path is out-of-mesh (no sidecar
    # client identity), so we exclude ONLY :9121 from Istio iptables
    # redirection. Redis protocol (:6379) stays mesh-protected.
    podAnnotations:
      traffic.sidecar.istio.io/excludeInboundPorts: "9121"
    persistence:
      size: 1Gi
      storageClass: local-path
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  metrics:
    # Enables the Bitnami redis-exporter sidecar on Redis pods,
    # exposing Prometheus-format metrics on container port 9121.
    # The chart-side NodePort Service in
    # templates/observability/service-redis-metrics-nodeport.yaml
    # exposes this to the host-side Prometheus (observability-stack
    # repo) at pinned NodePort 30921.
    enabled: true
    image:
      repository: bitnamilegacy/redis-exporter

# -- RabbitMQ (ADR-057, ADR-048 scan-control broker) ───────────────────
# Bitnami subchart wiring for the AMQP broker that carries scan
# requests + verdicts + audit events between memory-server (Repo B)
# and audittrace-content-control (Repo A). The AMQP topology
# (exchanges, queues, bindings, DLX) is bootstrapped post-install
# by templates/rabbitmq/job-amqp-topology-bootstrap.yaml.
#
# Single-node for dev / Profile A. Profile B/C should override
# `clustering.enabled=true` + `replicaCount=3` for a quorum-queue
# HA story.
rabbitmq:
  enabled: true
  image:
    repository: bitnamilegacy/rabbitmq
  # Istio interception applies to all inbound ports by default. The
  # built-in `rabbitmq_prometheus` plugin listens on 9419 for the
  # host-side Prometheus scrape via NodePort 30919 — that path is
  # out-of-mesh (no sidecar client identity), so we exclude ONLY :9419
  # from Istio iptables redirection. AMQP (:5672), AMQPS (:5671),
  # epmd (:4369), dist (:25672), and management (:15672) stay
  # mesh-protected.
  podAnnotations:
    traffic.sidecar.istio.io/excludeInboundPorts: "9419"
  auth:
    username: audittrace
    password: ""
    erlangCookie: ""
  clustering:
    enabled: false
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  metrics:
    enabled: true
    image:
      repository: bitnamilegacy/rabbitmq-exporter
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # The Bitnami subchart's loadDefinition hook is NOT used —
  # AMQP topology lives in templates/rabbitmq/job-amqp-topology-bootstrap.yaml
  # so it can be re-run on chart upgrade idempotently and the
  # topology is in version control alongside the chart.
  loadDefinition:
    enabled: false

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  auth:
    rootUser: minioadmin
    rootPassword: ""
  persistence:
    size: 20Gi
    storageClass: local-path
  defaultBuckets: "memory-shared,memory-private"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0"
  # ─────────────────────────────────────────────────────────────────────
  # HOSTNAME OVERRIDE PATTERN (per-deployment)
  #
  # The chart defaults to `audittrace.local`, which works for
  # localhost-only dev with /etc/hosts entries. For deployments using a
  # publicly-resolvable hostname (e.g. Google Workspace federation
  # rejects `.local` TLDs — ADR-044), override these in your local
  # values-local.yaml or via --set:
  #
  #   istio:
  #     gateway:
  #       hosts:
  #         - audittrace.allaboutdata.eu
  #
  #   keycloak:
  #     hostnameUrl: "https://audittrace.allaboutdata.eu:30952"
  #     externalIssuers:
  #       - "https://audittrace.allaboutdata.eu:30952/realms/audittrace"
  #       - "https://audittrace.local/realms/audittrace"   # transitional, drop later
  #
  # WHY a separate `keycloak.hostnameUrl`:
  #   That value is mapped to KC_HOSTNAME_URL in the Keycloak deployment
  #   template. It dictates the redirect_uri Keycloak sends to upstream
  #   IdPs (Google) — MUST match whatever you registered with the IdP.
  #
  # WHY a separate `keycloak.externalIssuers` list:
  #   Memory-server's JWT validator accepts the in-cluster issuer
  #   (audittrace.keycloakIssuer helper, used internally) PLUS any
  #   external hostname that Keycloak serves under (gateway-fronted
  #   tokens carry `iss=<hostnameUrl>/realms/audittrace`). Add an entry
  #   for every external hostname you want tokens to validate from.
  #
  # NOTE: A hostname rotation requires both keys overlapping — the
  # transitional `audittrace.local` entry stays in `externalIssuers`
  # until every existing token has expired (token TTL ~5 min in
  # production, refresh TTL longer).
  # ─────────────────────────────────────────────────────────────────────
  hostnameUrl: "https://audittrace.local"
  externalIssuers:
    - "https://audittrace.local/realms/audittrace"
  # `audittrace-webui` Keycloak client config. The realm-import JSON at
  # files/realm-audittrace.json templates these via `tpl` so per-deployment
  # overrides land cleanly. Add an entry for each external hostname the
  # webui will be served from (including the operator's own
  # `audittrace.allaboutdata.eu:30952` if applicable). See Phase B.9
  # in the 2026-05-03 stabilisation tail PR for context.
  webui:
    redirectUris:
      - "https://audittrace.local/oauth2/callback"
      - "https://audittrace.local/*"
      - "https://audittrace.local:30952/oauth2/callback"
      - "https://audittrace.local:30952/*"
      - "http://localhost:8765/*"
    webOrigins:
      - "https://audittrace.local"
      - "https://audittrace.local:30952"
      - "http://localhost:8765"
    postLogoutRedirectUri: "https://audittrace.local/*"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

chromadb:
  enabled: true
  image:
    repository: chromadb/chroma
    tag: "1.5.7"
  port: 8000
  persistence:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# -- Tests (helm test) -------------------------------------------------------
# Chart-managed `helm test` hook. Runs the RLS integration suite inside
# the cluster via the real Vault Agent + Istio mTLS path. Image built
# from `Dockerfile.tests` (Chart-A, 2026-05-13 — formerly the `tests`
# stage of `Dockerfile`). Triggered by `helm test audittrace` (or
# `make test-integration`). Disabled by default to keep dev installs
# clean; flip to true on the laptop / CI deploy when you need it.
tests:
  enabled: true
  image:
    repository: localhost:5000/audittrace/tests
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Secrets (override via --set or external secret manager) ------------------
secrets:
  postgres:
    password: ""
    appPassword: ""
  summariser:
    # Password for the dedicated audittrace_summariser role (LOGIN
    # NOSUPERUSER BYPASSRLS). Required when memoryServer.summariser.
    # manageRole is true. Set via --set or an external secret
    # manager — the Helm template errors out if left blank.
    password: ""
  chromadb:
    token: ""
  redis:
    password: ""
  rabbitmq:
    # ADR-057 broker credentials. Set via:
    #   --set-file secrets.rabbitmq.password=secrets/rabbitmq_password.txt
    #   --set-file secrets.rabbitmq.erlangCookie=secrets/rabbitmq_erlang_cookie.txt
    # Operator-supplied to keep the subchart's auth.password +
    # auth.erlangCookie aligned with what setup-vault.sh seeds at
    # `kv/audittrace/rabbitmq/{password,erlang_cookie}`.
    password: ""
    erlangCookie: ""
    # Separate user for the audittrace-content-control sibling so
    # vhost permissions can be scoped narrowly (consume from
    # audittrace.scan.requests, publish to audittrace.scan.verdicts +
    # audittrace.scan.audit). Bootstrapped by
    # job-amqp-topology-bootstrap.yaml.
    contentControlUser: content-control
    contentControlPassword: ""
  minio:
    secretKey: ""
    kmsKey: ""
    # ── ADR-048 PR-B7 — IAM split user credentials ─────────────────
    # Two scoped users provisioned by the bucket-init Job and
    # consumed by memory-server (audittrace_app) and
    # content-control's sibling pod (content_control). Both
    # passwords seeded by setup-vault.sh into
    # kv/audittrace/minio/{audittrace_app,content_control}.
    # Set the password values via --set-file at install time:
    #   --set-file secrets.minio.audittraceAppPassword=secrets/minio_audittrace_app_password.txt
    #   --set-file secrets.minio.contentControlPassword=secrets/minio_content_control_password.txt
    # The username defaults match the policy + user names the
    # bucket-init Job creates; override only if a deployment needs
    # different identifiers.
    audittraceAppUser: audittrace_app
    audittraceAppPassword: ""
    contentControlUser: content_control
    contentControlPassword: ""
  keycloak:
    adminPassword: "admin"
  # ── ADR-048 PR-B2 — Docker Hub Pro pull credentials ────────────────
  # Used to render `audittrace-dockerhub-pull` Secret of type
  # kubernetes.io/dockerconfigjson so the cluster can pull
  # docker.io/lfds/audittrace-content-control:* (and any future
  # private images under the same namespace). When vault.enabled=true,
  # values are sourced from kv/audittrace/docker-hub/pat via Vault
  # Agent and the chart's secret-dockerhub-pull.yaml is skipped.
  # Operator-supplied via:
  #   --set-file secrets.dockerHub.pat=secrets/docker_hub_pat.txt
  # The secrets/ directory is gitignored.
  dockerHub:
    username: ""
    pat: ""

# -- ADR-048 ingestion content-control (PR-B2) ───────────────────────────────
# Cross-repo coupling to the audittrace-content-control sibling chart.
# This top-level block lets the AuditTrace-AI chart reference the
# sibling without managing its lifecycle (the sibling is its own
# Helm release). Used by Istio AuthorizationPolicy stubs to whitelist
# the content-control ServiceAccount on MinIO + Redis paths.
contentControl:
  # The ServiceAccount name the audittrace-content-control sibling
  # chart creates (its serviceaccount.yaml uses the chart's own name
  # by default — `audittrace-content-control`). Used in this chart's
  # Istio AuthorizationPolicies so the sibling can reach MinIO and
  # Redis.
  serviceAccountName: "audittrace-content-control"

# -- Vault (ADR-043) ---------------------------------------------------------
# When vault.enabled=true, secrets are sourced from in-cluster Vault via the
# Vault Agent Injector sidecar pattern. The legacy `secrets.*` plaintext keys
# above are ignored. Production posture (global.productionMode=true) requires
# vault.enabled=true.
#
# The dev/laptop-first profile keeps vault.enabled=false; the chart renders
# identically to the pre-ADR-043 era. ADR-045 §Rule 1 exception is bounded
# to this single dependency.
vault:
  enabled: false

  # Audittrace-specific Vault wiring (consumed by our templates/vault/* and
  # workload Vault Agent annotations — NOT passed to the upstream sub-chart).
  audittrace:
    # KV v2 mount + path prefix. Per ADR-043 §5: kv/audittrace/<service>/<key>.
    kvMount: kv
    pathPrefix: audittrace
    # Vault Agent Injector image + version pin (matches the sub-chart's
    # injector when vault.enabled=true).
    injector:
      image: hashicorp/vault-k8s
      tag: 1.4.2
    # Bootstrap-only values. Operator supplies these once on first install
    # via --set-file; subsequent installs MUST omit them. The chart errors
    # out if both vault.enabled=true and bootstrap.* are present after
    # Vault is initialised. See ADR-043 §8.
    bootstrap:
      postgres:
        password: ""
        appPassword: ""
      summariser:
        password: ""
      chromadb:
        token: ""
      redis:
        password: ""
      minio:
        secretKey: ""
        kmsKey: ""
      keycloak:
        adminPassword: ""

  # Upstream sub-chart values (hashicorp/vault chart 0.30.x). Single-node
  # file backend, manual unseal at boot per ADR-043 §7.
  server:
    dev:
      enabled: false
    standalone:
      enabled: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "file" {
          path = "/vault/data"
        }
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: local-path
    # NB: do not set serviceAccount.name. The upstream Vault chart's
    # ClusterRoleBinding (audittrace-vault-server-binding) targets a
    # release-prefixed name; an override here breaks the auth-delegator
    # path required by the kubernetes auth backend's TokenReview calls.
    # ADR-043 hot-fix 2026-04-25: caught at first live install.
    serviceAccount:
      create: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  injector:
    # Vault Agent Injector sidecar — required for the file-mount secret
    # delivery pattern (ADR-043 §4).
    enabled: true
    # #358 — disable the upstream chart's default injector pod-anti-affinity.
    # The default is a requiredDuringScheduling podAntiAffinity on
    # topologyKey kubernetes.io/hostname (forbid two injector webhook pods on
    # one node). On the single-node k3s laptop a rolling update's surge pod can
    # never schedule alongside the running one → the Deployment deadlocks
    # mid-rollout (a Pending pod lingers for weeks, and helm --wait times out
    # → the release is marked "failed" even though the app is healthy). Empty
    # string overrides the upstream default so the injector schedules anywhere.
    # Multi-node prod can restore a soft (preferredDuringScheduling) rule.
    affinity: ""
    # Pod-level annotations. The mutating webhook listens on :8080 and
    # is invoked by the K8s API server, which is OUT of the Istio mesh
    # and does not speak Istio mTLS. We keep the Istio sidecar on the
    # injector pod (so its own outbound calls are mTLS-protected) and
    # exclude ONLY the inbound :8080 from Istio interception. Without
    # this, the K8s API → webhook TLS handshake fails (127.0.0.6 EOF)
    # and the mutating admission silently no-ops because the upstream
    # chart's MutatingWebhookConfiguration has failurePolicy: Ignore.
    annotations:
      traffic.sidecar.istio.io/excludeInboundPorts: "8080"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # CSI driver not used; we deliver via Agent Injector.
  csi:
    enabled: false

  # UI enabled for POC operator convenience. Production deploys turn off.
  ui:
    enabled: true
    serviceType: ClusterIP
