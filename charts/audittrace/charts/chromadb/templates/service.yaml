{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-chromadb
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
