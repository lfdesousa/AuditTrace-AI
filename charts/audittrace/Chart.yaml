apiVersion: v2
name: audittrace
description: AuditTrace-AI — audit-trail-first memory augmentation platform
type: application
# v1.5.3: the memory-server's accepted-issuer set (ISSUER_EXTRAS) now
# AUTO-includes the issuer derived from keycloak.hostnameUrl via the
# audittrace.keycloakIssuerExtras helper, deduped with the explicit
# keycloak.externalIssuers list. Tokens carry iss=<hostnameUrl>/realms/
# audittrace; previously externalIssuers had to be hand-synced with
# hostnameUrl, so overriding hostnameUrl alone (e.g. to a :9443 operator
# tunnel port) produced a 401 — the token's iss was not in the accept
# list. Now they can't drift. No app-code change. (2026-05-28 cloud
# Tier-0 login burn)
# v1.5.2: harden the llmStub templates against `helm upgrade
# --reuse-values` from a pre-1.5.0 release. Such an upgrade leaves
# `.Values.llmStub` entirely absent (nil), and the 1.5.0 guards did a
# bare `.Values.llmStub.enabled` → "nil pointer evaluating interface
# {}.enabled". The guards now use `(.Values.llmStub | default dict).enabled`
# (and likewise for externalLLM in the mutual-exclusion assert), so an
# absent llmStub renders cleanly with the stub off. No app-code change.
# v1.5.1: wire the otel-collector metrics pipeline to a remote
# `prometheusremotewrite/obs` exporter, gated on the already-present
# `observability.external.prometheusHost`. Fixes the gap where a remote
# obs Prometheus (one that cannot scrape into the cluster) got traces but
# no application metrics — the value was set but never consumed, so the
# HTTP-server panels read "No data". Laptop dev (empty prometheusHost)
# keeps the scrape-only :8889 model unchanged. Also makes the llmStub
# report a payload-scaled prompt_tokens so memory-augmentation assertions
# hold against the stub, not only a real model (#218). No app-code change
# (memory-server rebuilt identically); all version sites move to 1.5.1 in
# lockstep per the publish gate. (#217, #218)
# v1.5.0: adds the optional in-cluster `llmStub` component (default
# off) — a deterministic OpenAI-compatible stub that lets the
# memory-server proxy / auth / RLS / telemetry pipeline be validated
# end-to-end without a real llama-server. Pairs with
# externalLLM.enabled=false; also unifies the kind-CI + docker-compose
# mock onto a single published image. Chart-only — appVersion unchanged.
# v1.4.0: adds `observability.external.scheme` (default `http`) — used
# by otel-collector + promtail + memory-server templates to compose
# tempo / loki / langfuse egress URLs. Cloud deployments where the
# obs stack sits behind a TLS-terminating load balancer (e.g. AWS NLB
# with ACM cert per ADR-008) override to `https`. Backward-compatible
# for laptop dev (default stays http). 2026-05-23 burn: chart pods
# couldn't reach AWS-loadtest obs NLB on TLS listeners.
# Chart-only change — no app code touched, so appVersion stays at 1.3.1.
version: 1.6.5
# appVersion MUST track pyproject.toml::version. Pinned by
# tests/test_version_drift.py (ADR-055 — single chart-side source
# for runtime observability + k8s labels + OTEL service.version).
# v1.3.0 ships the ADR-006 objectStorage backend selector
# (`objectStorage.backend` ∈ {minio, aws}) + the Python refactor
# behind the shared audittrace-object-storage@v0.1.1 ABC. When
# objectStorage.backend=minio (default), behaviour is byte-identical
# to v1.2.1; backend=aws activates the IRSA-native boto3 path.
appVersion: "1.6.5"
keywords:
  - ai
  - audit
  - memory
  - llm
  - zero-trust
maintainers:
  - name: Luis Filipe de Sousa
    email: lde.sousa@gmail.com
dependencies:
  - name: postgresql
    version: "~16"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  # ADR-057 — scan-control broker for ADR-048's content-control
  # pipeline. AMQP topic exchange + quorum queues + DLX. ADR-046
  # chat persistence stays on Redis Streams; the two brokers
  # coexist by design (different domains).
  - name: rabbitmq
    version: "~14"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
  - name: vault
    version: "~0.30"
    repository: https://helm.releases.hashicorp.com
    condition: vault.enabled
