apiVersion: v2
name: audittrace
description: AuditTrace-AI — audit-trail-first memory augmentation platform
type: application
version: 1.3.0
# appVersion MUST track pyproject.toml::version. Pinned by
# tests/test_version_drift.py (ADR-055 — single chart-side source
# for runtime observability + k8s labels + OTEL service.version).
# NB: helm chart `version:` (above) is decoupled from `appVersion:` —
# v1.3.0 of the chart introduces the `objectStorage` backend selector
# (ADR-006) without bumping the app image. Python at 1.2.1 already
# honours AUDITTRACE_OBJECT_STORAGE_BACKEND (defaults to "minio";
# behaviour byte-identical to v1.2.1 when objectStorage.backend=minio).
appVersion: "1.2.1"
keywords:
  - ai
  - audit
  - memory
  - llm
  - zero-trust
maintainers:
  - name: Luis Filipe de Sousa
    email: lde.sousa@gmail.com
dependencies:
  - name: postgresql
    version: "~16"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  # ADR-057 — scan-control broker for ADR-048's content-control
  # pipeline. AMQP topic exchange + quorum queues + DLX. ADR-046
  # chat persistence stays on Redis Streams; the two brokers
  # coexist by design (different domains).
  - name: rabbitmq
    version: "~14"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
  - name: vault
    version: "~0.30"
    repository: https://helm.releases.hashicorp.com
    condition: vault.enabled
