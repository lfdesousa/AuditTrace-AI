apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-memory-server
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: memory-server
spec:
  replicas: {{ .Values.memoryServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "audittrace.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: memory-server
  template:
    metadata:
      labels:
        {{- include "audittrace.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: memory-server
        sidecar.istio.io/inject: "true"
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        {{- if .Values.vault.enabled }}
        {{- include "audittrace.vaultAnnotations.memoryServer" . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.memoryServer.serviceAccount.create }}
      serviceAccountName: {{ .Values.memoryServer.serviceAccount.name }}
      {{- end }}
      containers:
        - name: memory-server
          # Image tag defaults to .Chart.AppVersion so chart upgrades
          # automatically track a matching image without operators
          # having to bump values.yaml in lockstep. Same pattern as
          # cc-repo's PR-A14 / B6 — see Chart.AppVersion sync test
          # for the drift guard. Operators can still override with
          # --set memoryServer.image.tag=<explicit> for pinning.
          image: "{{ .Values.memoryServer.image.repository }}:{{ .Values.memoryServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.memoryServer.image.pullPolicy }}
          {{- if .Values.vault.enabled }}
          # entrypoint.sh handles Vault-injected secret sourcing internally
          # (gated on VAULT_AGENT_REQUIRED=true env). It fails fast with a
          # clear diagnostic + exit code 79 when the injector did NOT add
          # the sidecar — covers the 2026-05-03 transient-TLS class of
          # admission-webhook failure. See ADR-043 §4 +
          # docs/architecture/sequence-vault-injection.md for the boot
          # sequence and scripts/deploy-preflight.sh for the pre-deploy
          # gate that aborts before such a pod is ever created.
          command: ["/app/scripts/entrypoint.sh"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.memoryServer.port }}
              protocol: TCP
          env:
            {{- if .Values.vault.enabled }}
            # Tells scripts/entrypoint.sh to require the Vault Agent
            # secret file at /vault/secrets/env. If missing (i.e. the
            # injector failed to attach the sidecar — see 2026-05-03
            # TLS-handshake incident), entrypoint exits 79 with a clear
            # diagnostic instead of the previous cryptic shell error.
            - name: VAULT_AGENT_REQUIRED
              value: "true"
            {{- end }}
            # ── Plain config from values ──────────────────────────────
            {{- range $key, $value := .Values.memoryServer.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if not .Values.vault.enabled }}
            # ── Computed service URLs (vault.enabled=false branch) ────
            # When vault.enabled=true these are set at runtime by the
            # Vault Agent-rendered /vault/secrets/env (see ADR-043).
            - name: AUDITTRACE_POSTGRES_URL
              value: {{ include "audittrace.postgresAppUrl" . | quote }}
            - name: AUDITTRACE_SUMMARIZER_POSTGRES_URL
              value: {{ include "audittrace.postgresOwnerUrl" . | quote }}
            {{- end }}
            - name: AUDITTRACE_CHROMA_URL
              value: "http://{{ .Release.Name }}-chromadb:8000"
            - name: AUDITTRACE_REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: AUDITTRACE_MINIO_URL
              value: "http://{{ .Release.Name }}-minio:9000"
            - name: AUDITTRACE_KEYCLOAK_ISSUER
              value: {{ include "audittrace.keycloakIssuer" . | quote }}
            - name: AUDITTRACE_KEYCLOAK_JWKS_URL
              value: {{ include "audittrace.keycloakJwksUrl" . | quote }}
            # Sourced from values: keycloak.externalIssuers. Override per
            # deployment to add hostname-specific issuer entries (e.g.
            # `audittrace.allaboutdata.eu:30952` for Google federation).
            # See `keycloak.externalIssuers` documentation in values.yaml.
            - name: AUDITTRACE_KEYCLOAK_ISSUER_EXTRAS
              value: {{ .Values.keycloak.externalIssuers | toJson | quote }}
            - name: AUDITTRACE_JWT_AUDIENCE
              value: "audittrace-server"
            - name: AUDITTRACE_LLAMA_URL
              value: "http://{{ .Release.Name }}-llm-chat:{{ .Values.externalLLM.chat.port }}/v1"
            - name: AUDITTRACE_EMBED_URL
              value: "http://{{ .Release.Name }}-llm-embed:{{ .Values.externalLLM.embed.port }}/v1"
            - name: AUDITTRACE_SUMMARIZER_URL
              value: "http://{{ .Release.Name }}-llm-summarizer:{{ .Values.externalLLM.summarizer.port }}/v1"
            - name: AUDITTRACE_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:4318"
            # AUDITTRACE_LANGFUSE_HOST is rendered only when
            # observability.external.langfuseHost is set (FQDN-only per
            # ADR-045). When empty the env var is omitted entirely so
            # memory-server's pydantic-settings default takes over
            # (or AUDITTRACE_LANGFUSE_ENABLED=false should also be set
            # in the operator env block to keep the langfuse client
            # from initialising against an unreachable default).
            {{- if .Values.observability.external.langfuseHost }}
            - name: AUDITTRACE_LANGFUSE_HOST
              value: "http://{{ .Values.observability.external.langfuseHost }}:{{ .Values.observability.external.langfusePort | default 3000 }}"
            {{- end }}
            # ── Secret-sourced ────────────────────────────────────────
            {{- if not .Values.vault.enabled }}
            # vault.enabled=false branch: K8s Secrets via valueFrom.
            # When vault.enabled=true these env vars are set at runtime
            # by Vault Agent (see ADR-043 §4 + the helper).
            - name: AUDITTRACE_CHROMA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-chromadb-secret
                  key: token
            - name: AUDITTRACE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: redis-password
            # ADR-048 PR-B8 — MinIO ACCESS + SECRET sourced from the
            # IAM-split Secret (audittrace_app user, parser-exploit
            # close per ADR-048 Decision rule §1). The Bitnami root
            # creds are no longer the memory-server's MinIO identity.
            - name: AUDITTRACE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-minio-iam
                  key: audittrace_app_user
            - name: AUDITTRACE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-minio-iam
                  key: audittrace_app_password
            {{- end }}
            # vault.enabled=true branch — MinIO ACCESS/SECRET keys are
            # exported by Vault Agent into /vault/secrets/env (see the
            # vaultAnnotations.memoryServer helper).
            #
            # ADR-057 PR-B8 — RabbitMQ env vars are wired UNCONDITIONALLY
            # (both vault.enabled branches) from the Bitnami subchart's
            # `<release>-rabbitmq` Secret. Vault is intentionally NOT in
            # the path: the Bitnami Secret is already the credential
            # source of truth and adding a Vault mirror would force a
            # policy upload on every chart upgrade. Order matters here:
            # AUDITTRACE_RABBITMQ_PASSWORD MUST precede
            # AUDITTRACE_SCAN_AMQP_URL because k8s env $(VAR) expansion
            # only resolves variables declared earlier in the list.
            - name: AUDITTRACE_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-rabbitmq
                  key: rabbitmq-password
            - name: AUDITTRACE_SCAN_AMQP_URL
              value: "amqp://{{ .Values.rabbitmq.auth.username }}:$(AUDITTRACE_RABBITMQ_PASSWORD)@{{ .Release.Name }}-rabbitmq:5672/"
            # OTEL_RESOURCE_ATTRIBUTES is built from .Chart.AppVersion
            # (single chart-side source per ADR-055 §2). Operators who
            # need to override (e.g. for a different deployment env
            # label) can do so via .Values.memoryServer.env by adding
            # OTEL_RESOURCE_ATTRIBUTES there — the earlier env-loop
            # then takes precedence. The version token always tracks
            # the chart, never a values overlay.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=audittrace,service.version={{ .Chart.AppVersion }},deployment.environment={{ .Values.global.environment | default "local" }}"
          volumeMounts:
            # ADR-053 — Swiss federal TSL signer cert mounted from
            # ConfigMap. Read-only; the SwissTslTrustStoreBuilder uses
            # this to validate the Swiss TSL XAdES signature before
            # registering any TSP. SHA-1 OOB-verified against
            # https://uri.tsl-switzerland.ch/TrstSvc/TrustedList/schemerules/CH/index.html
            # on 2026-05-09.
            - name: swiss-federal-tsl
              mountPath: /etc/audittrace/swiss-federal-tsl
              readOnly: true
            # Backlog #13 — operator-vendored static trust roots
            # (ADR-052 §3). Loaded by `StaticTrustStoreBuilder`
            # alongside the EU LOTL + Swiss federal TSL builders
            # via the composite trust-store builder. Closes the
            # SwissSign 2020-2 root gap (reCAPTCHA-blocked website
            # download); root extracted from `main_signed.pdf`'s
            # embedded PAdES chain. Drop additional .pem files
            # under `charts/audittrace/trust-store/static-roots/`
            # to extend.
            - name: static-roots
              mountPath: /etc/audittrace/static-roots
              readOnly: true
          # startupProbe covers the cold-cluster boot path where
          # the lifespan blocks on ``ScanAmqpClient.ensure_connected``
          # (server.py:326). PR-B10 added a retry-with-backoff for
          # the kube-proxy Service-IP-not-routable race; that retry
          # has a documented worst-case budget of ~91 s (6 attempts
          # × 10 s timeout + 1+2+4+8+16 = 31 s of sleeps). The
          # liveness probe's 45 s budget is too tight for that — the
          # kubelet would kill the pod mid-retry on a cold cluster.
          # startupProbe gives 150 s (5 s × 30) before failing,
          # which comfortably covers the AMQP retry budget AND keeps
          # liveness tight (45 s) for catching real post-boot hangs.
          # Anchor: ~/work/audittrace-evidence/20260515-memory-server-startup-race/STARTUP-PROFILE.md.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.memoryServer.resources | nindent 12 }}
      volumes:
        # ADR-053 — Swiss federal TSL signer cert as ConfigMap.
        # Vendored at chart-build time from
        # charts/audittrace/trust-store/swiss-federal-tsl/CH-TL-cert.der
        # via the configmap template; mounted read-only into
        # memory-server. The cert binary is ~2 KB so ConfigMap is
        # comfortably within the k8s 1 MiB-per-CM limit.
        - name: swiss-federal-tsl
          configMap:
            name: {{ .Release.Name }}-swiss-federal-tsl
        # Backlog #13 — operator-vendored static trust roots
        # rendered as `data:` (PEM is text) by configmap-static-roots.yaml.
        - name: static-roots
          configMap:
            name: {{ .Release.Name }}-static-roots
