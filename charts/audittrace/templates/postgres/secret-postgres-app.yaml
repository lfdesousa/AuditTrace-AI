{{- /* Chart-B (2026-05-13) — postgres `audittrace_app` password wiring.

       Closes Finding #3 of the PR-B10 chart-hardening plan
       (anchor: project_postgres_app_password_wiring).

       The Bitnami postgresql subchart runs init scripts from
       templates/memory-server/configmap-initdb.yaml at first boot.
       init-audittrace-app-role.sh reads AUDITTRACE_APP_PASSWORD to
       know what password to set on the application role, falling
       back to POSTGRES_PASSWORD when unset.

       Before Chart-B nothing injected AUDITTRACE_APP_PASSWORD, so
       the role was silently created with POSTGRES_PASSWORD
       (= secrets.postgres.password). Memory-server's connect URL
       (_helpers.tpl `postgresAppUrl`) uses secrets.postgres.appPassword
       — when those diverged, memory-server got `FATAL: password
       authentication failed for user "audittrace_app"`. Trip-wired
       on PR-B10 CI run #4 (2026-05-13); production "worked" only
       because operators happened to set both to the same value.

       This Secret carries `secrets.postgres.appPassword` for the
       Bitnami subchart to mount as AUDITTRACE_APP_PASSWORD via
       `postgresql.primary.extraEnvVars` (see values.yaml). Same
       pattern as templates/secrets/secret-minio-iam.yaml.

       Vault gating: when vault.enabled=true, operators provide
       AUDITTRACE_APP_PASSWORD to the postgres pod through Vault
       Agent (sibling annotation overlay; out of this PR's scope).
       The template skips here to avoid double-sourcing. */ -}}
{{- if and (not .Values.vault.enabled) .Values.secrets.postgres.appPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-app
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.postgres.appPassword | quote }}
{{- end }}
