{{- if and .Values.postgresql.enabled .Values.memoryServer.summariser.manageRole }}
# Ensures a dedicated, minimum-privilege `audittrace_summariser` role
# exists with exactly the grants needed for the session-summariser
# background loop (ADR-026 §RLS posture, ADR-030 §Summariser):
#
#   - LOGIN NOSUPERUSER BYPASSRLS    — bypass RLS on interactions/sessions
#     only. Still a normal (non-super) role so it can't touch pg_catalog
#     or DDL.
#   - SELECT on `interactions`        — cross-user read to pick eligible
#     sessions for summarisation. NO INSERT/UPDATE/DELETE on interactions
#     so a compromised summariser cannot rewrite chat history.
#   - SELECT/INSERT/UPDATE on `sessions`  — writes summaries back. No
#     DELETE: summaries only grow, never disappear.
#   - No access to `tool_calls`       — summariser doesn't need it.
#
# The generic `audittrace` (Bitnami default) and `audittrace_app` roles
# keep their NOSUPERUSER + NOBYPASSRLS posture. Only this one role
# carries the elevated privilege, and only the summariser connects as
# it — so RLS isolation for every other caller is preserved.
#
# Runs as a post-install / post-upgrade Helm hook so the role shape is
# kept consistent across chart lifecycle events and across existing
# clusters where `docker-entrypoint-initdb.d` has already fired.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-ensure-summariser-role
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # backoffLimit was 3 → raised to 12 after the 2026-04-24 outage. During
  # a `helm upgrade` that also rolls audittrace-postgresql-0 (e.g. because
  # an unrelated chart change nudges the StatefulSet), the hook started
  # before Postgres accepted connections and exhausted 3 retries in under
  # 30 s. Combined with the pre-run pg_isready wait-loop below, 12 is
  # plenty: 12 × 10 s backoff ≈ 2 min of hook retries, and each hook
  # invocation waits up to 2 min for pg_isready. See ADR-045 §Verification
  # postmortem.
  backoffLimit: 12
  # Hard cap. The actual work (pg_isready + DDL + sidecar shutdown)
  # finishes in <60 s on a healthy cluster. 600 s is the operator's
  # backstop — if the sidecars somehow refuse to terminate (Phase C.8
  # root cause), the Job dies on its own instead of leaving a stuck
  # NotReady pod that fails the helm post-upgrade hook indefinitely.
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "audittrace.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ensure-summariser-role
        # Postgres runs with PeerAuthentication STRICT + an Authorization-
        # Policy that allows only the memory-server SA and the default SA
        # inside the namespace. The Job needs an Istio sidecar to present
        # a SPIFFE identity; native-sidecar semantics let the sidecar
        # terminate with the main container so the Job actually completes.
        sidecar.istio.io/inject: "true"
      annotations:
        {{- if .Values.vault.enabled }}
        {{- include "audittrace.vaultAnnotations.summariserJob" . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: psql
          image: bitnami/postgresql:16
          env:
            - name: PGHOST
              value: "{{ .Release.Name }}-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: "{{ .Values.postgresql.auth.database | default "audittrace" }}"
            - name: PGUSER
              value: "postgres"
            {{- if not .Values.vault.enabled }}
            # vault.enabled=false branch — K8s Secret. When vault.enabled=true
            # PGPASSWORD + SUMMARISER_PASSWORD come from /vault/secrets/env
            # (sourced in the wrapper command below; see ADR-043 §4).
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: postgres-password
            - name: SUMMARISER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-summariser-db
                  key: password
            {{- end }}
          volumeMounts:
            - name: sql
              mountPath: /work
              readOnly: true
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              {{- if .Values.vault.enabled }}
              # Vault Agent renders /vault/secrets/env with PGPASSWORD +
              # SUMMARISER_PASSWORD exports (ADR-043 §4). Source before any
              # `psql`/`pg_isready` invocation that needs them.
              set -a; . /vault/secrets/env; set +a
              {{- end }}
              # Wait for Postgres to accept connections before running the
              # role SQL. During a `helm upgrade` the audittrace-postgresql
              # StatefulSet may roll (re-binding its PVC, re-initialising
              # the sidecar), and the hook can land in the gap between
              # termination and the new pod being Ready. Without this loop
              # the hook fails fast on connection-refused and burns its
              # backoffLimit. 60 iterations × 2 s = 120 s of patience —
              # well beyond a typical Bitnami Postgres roll. See ADR-045
              # §Verification postmortem.
              echo "waiting for Postgres at ${PGHOST}:${PGPORT} ..."
              for i in $(seq 1 60); do
                if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  echo "Postgres is ready after ${i} attempt(s)."
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "Postgres did not become ready within 120 s." >&2
                  exit 1
                fi
                sleep 2
              done
              echo "ensuring dedicated summariser role with minimum privileges..."
              # Expand the password into a psql variable so the SQL file
              # stays static and safely quoted at the SQL layer (%L).
              psql --set ON_ERROR_STOP=on \
                   --set "pw=$SUMMARISER_PASSWORD" \
                   -f /work/ensure-role.sql
              echo "done."
              # ── Istio sidecar shutdown (Phase C.8) ───────────────────────
              # The Vault Agent is configured with `agent-pre-populate-only:
              # "true"` so it runs as an init container only and exits
              # before the main container starts — no need to kill it
              # here. Istio is the only remaining sidecar to terminate.
              # Without the quitquitquit call, istio-proxy keeps the Pod
              # 2/3 NotReady forever and the Helm post-upgrade hook
              # reports `failed: context deadline exceeded`.
              curl --max-time 5 -sS -o /dev/null \
                -w 'istio quitquitquit: HTTP %{http_code}\n' \
                -X POST http://127.0.0.1:15020/quitquitquit \
                || echo "warn: istio quitquitquit curl failed (sidecar may already be gone)"
              echo "Job completing."
      volumes:
        - name: sql
          configMap:
            name: {{ .Release.Name }}-ensure-summariser-sql
{{- end }}
