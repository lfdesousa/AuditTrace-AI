{{- if .Values.chromadb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-chromadb
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  serviceName: {{ .Release.Name }}-chromadb
  replicas: 1
  selector:
    matchLabels:
      {{- include "audittrace.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chromadb
  template:
    metadata:
      labels:
        {{- include "audittrace.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chromadb
        sidecar.istio.io/inject: "true"
      annotations:
        {{- if .Values.vault.enabled }}
        {{- include "audittrace.vaultAnnotations.chromadb" . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}-chromadb
      containers:
        - name: chromadb
          image: "{{ .Values.chromadb.image.repository }}:{{ .Values.chromadb.image.tag }}"
          ports:
            - containerPort: {{ .Values.chromadb.port }}
              name: http
          {{- if .Values.vault.enabled }}
          # Source Vault Agent-rendered env file before exec'ing the chromadb
          # entrypoint. CHROMA_SERVER_AUTHN_CREDENTIALS is supplied by Vault
          # at /vault/secrets/env (ADR-043 §4). The guard fails fast with
          # exit 79 + a structured diagnostic if the file is missing —
          # see _helpers.tpl `audittrace.vaultSecretFileGuard` (added
          # after the 2026-05-03 injector-TLS-handshake incident).
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{ include "audittrace.vaultSecretFileGuard" . | nindent 14 }}
              set -a
              . /vault/secrets/env
              set +a
              exec dumb-init -- chroma run /config.yaml
          {{- end }}
          env:
            - name: CHROMA_SERVER_AUTHN_PROVIDER
              value: "chromadb.auth.token_authn.TokenAuthenticationServerProvider"
            {{- if not .Values.vault.enabled }}
            - name: CHROMA_SERVER_AUTHN_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-chromadb-secret
                  key: token
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: {{ .Values.chromadb.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: {{ .Values.chromadb.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.chromadb.resources | nindent 12 }}
          volumeMounts:
            - name: data
              # MUST match the `persist_path` in the image's /config.yaml.
              #
              # ChromaDB 0.x persisted to /chroma/chroma; 1.x persists to
              # /data. The mount was written for 0.x and never updated when
              # the image moved to 1.x, so from that upgrade until 2026-07-21
              # ChromaDB wrote its entire database to the container's
              # EPHEMERAL overlay filesystem while a 10Gi PVC sat empty at
              # /chroma/chroma. Every pod restart silently wiped the semantic
              # memory layer — 160 restarts by the time it was found.
              #
              # Nothing surfaced it: the pod was Ready, both probes hit
              # /api/v2/heartbeat which does not touch persistence, and an
              # empty store answers queries perfectly well with zero results.
              # Recall simply returned nothing, forever, and the model read
              # that as "the document does not exist" (#374).
              #
              # Do NOT change this path without changing persist_path too.
              # tests/test_chart_drift_guards.py pins the pair, and
              # post-deploy-verify.sh check 12 asserts at RUNTIME that the
              # persist path is on the PVC rather than the overlay — the
              # only check that would have caught this.
              mountPath: {{ .Values.chromadb.persistPath | default "/data" | quote }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.chromadb.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.chromadb.persistence.size }}
{{- end }}
