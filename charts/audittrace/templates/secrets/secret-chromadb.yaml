{{- /* When vault.enabled, the chromadb token lives at kv/audittrace/chromadb/main
       and is sourced via Vault Agent (ADR-043 §4); this Secret is not rendered. */ -}}
{{- if and .Values.secrets.chromadb.token (not .Values.vault.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-chromadb-secret
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.secrets.chromadb.token | quote }}
{{- end }}
