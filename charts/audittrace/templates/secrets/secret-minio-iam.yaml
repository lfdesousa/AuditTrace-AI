{{- /* ADR-048 PR-B7 — MinIO IAM split user credentials.

       Two scoped users provisioned by the bucket-init Job:
         - audittrace_app  — memory-server's MinIO client. PUT
                              quarantine/, GET+PUT+DELETE on
                              episodic/ + procedural/. EXPLICIT
                              DENY on GET quarantine/* (the
                              parser-exploit close from ADR-048
                              Decision rule §1).
         - content_control — the sibling pod's MinIO client. GET
                              +DELETE quarantine/, PUT
                              episodic/papers/. NO access to
                              procedural/, trust-store/, or any
                              other prefix.

       Both passwords seeded into Vault by setup-vault.sh:
         kv/audittrace/minio/audittrace_app
         kv/audittrace/minio/content_control

       When vault.enabled=true, Vault Agent renders the Secret;
       this template skips. When vault.enabled=false, operators
       supply the values via secrets/ — same shape as the rest of
       the chart's secret templates. */ -}}
{{- if and .Values.minio.enabled (not .Values.vault.enabled) }}
{{- $appUser := .Values.secrets.minio.audittraceAppUser | default "" -}}
{{- $appPw := .Values.secrets.minio.audittraceAppPassword | default "" -}}
{{- $ccUser := .Values.secrets.minio.contentControlUser | default "" -}}
{{- $ccPw := .Values.secrets.minio.contentControlPassword | default "" -}}
{{- if or $appPw $ccPw }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-minio-iam
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  audittrace_app_user: {{ $appUser | default "audittrace_app" | quote }}
  audittrace_app_password: {{ $appPw | quote }}
  content_control_user: {{ $ccUser | default "content_control" | quote }}
  content_control_password: {{ $ccPw | quote }}
{{- end }}
{{- end }}
