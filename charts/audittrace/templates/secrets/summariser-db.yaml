{{- if and .Values.postgresql.enabled .Values.memoryServer.summariser.manageRole }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-summariser-db
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: summariser
type: Opaque
stringData:
  # Password for the dedicated audittrace_summariser role. Set via
  # .Values.secrets.summariser.password — if the operator leaves it
  # blank at deploy time, Helm errors out rather than silently
  # provisioning a guessable password.
  password: {{ required "secrets.summariser.password is required when memoryServer.summariser.manageRole is true" .Values.secrets.summariser.password | quote }}
{{- end }}
