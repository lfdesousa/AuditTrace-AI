{{- /*
Self-signed TLS cert for the Istio Ingress Gateway.

CRITICAL: the Istio Gateway with SDS looks up `credentialName` in the
INGRESS GATEWAY pod's namespace (istio-system) — NOT the workload's
release namespace. Without the explicit `namespace: istio-system` below,
the Secret would land in the audittrace namespace and the gateway would
silently keep serving an old cert from istio-system.

When `lookup` finds the Secret already in istio-system, we reuse the
existing cert+key (so `helm upgrade` doesn't rotate the cert and break
clients holding the old fingerprint). On first install, Helm's built-in
`genSelfSignedCert` mints a new cert with both `audittrace.local` and
`localhost` in SAN so the gateway works for:
  - the in-cluster smoke (curl https://localhost:30952/...)
  - the operator's hosts-file mapping (https://audittrace.local:30952/...)
  - the OpenCode TUI / CLI without NODE_TLS_REJECT_UNAUTHORIZED hacks

Cert validity is 10 years (3650 days) — POC posture, not a production
rotation cadence. See ADR-043 §"TLS posture" for the production successor
(cert-manager).

To force a new cert (e.g. after rotating SANs): delete the Secret then
`helm upgrade`. Helm's `lookup` will return empty and the
`genSelfSignedCert` branch fires.
*/}}
{{- if .Values.istio.enabled }}
{{- $secretName := .Values.istio.gateway.credentialName | default "audittrace-tls" }}
{{- $istioNs := .Values.istio.gateway.namespace | default "istio-system" }}
{{- $existing := lookup "v1" "Secret" $istioNs $secretName }}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ $secretName }}
  namespace: {{ $istioNs }}
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
data:
{{- if and $existing $existing.data }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
{{- else }}
{{- $altNames := list "audittrace.local" "localhost" }}
{{- $cert := genSelfSignedCert "audittrace.local" (list "127.0.0.1" "::1") $altNames 3650 }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
