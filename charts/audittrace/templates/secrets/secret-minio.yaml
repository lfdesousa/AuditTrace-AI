{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-minio-secret
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-password: {{ .Values.secrets.minio.secretKey | quote }}
  kms-key: {{ .Values.secrets.minio.kmsKey | quote }}
{{- end }}
