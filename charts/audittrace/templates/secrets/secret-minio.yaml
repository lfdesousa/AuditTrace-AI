{{- /* When vault.enabled, MinIO root pw + KMS master key live at
       kv/audittrace/minio/root and are sourced via Vault Agent (ADR-043 §4);
       this Secret is not rendered (and the required-guards below are skipped,
       because Vault is the source of truth, not values.yaml). */ -}}
{{- if and .Values.minio.enabled (not .Values.vault.enabled) }}
{{/*
secrets.minio.secretKey and secrets.minio.kmsKey MUST both be non-empty at
render time. A blank kmsKey was the 2026-04-24 outage root cause: the
StatefulSet used to interpolate the value inline, so a blank landed in
the running pod env as "audittrace-key:" and MinIO fatal-ed with
"kms: invalid key length 0". Guard both values with `required` so the
failure surfaces at `helm template` time with a clear, actionable error
rather than at MinIO startup. See ADR-045 §Verification postmortem.

`trim` strips trailing whitespace that would otherwise leak in from
`--set-file secrets.minio.kmsKey=secrets/minio_kms_key.txt` — the file
is committed with a trailing newline for POSIX compliance.
*/}}
{{- $secretKey := required "secrets.minio.secretKey is required (pass --set or --set-file); see zbook-runbook Daily bring-up" .Values.secrets.minio.secretKey | trim -}}
{{- $kmsKey := required "secrets.minio.kmsKey is required (pass --set-file secrets.minio.kmsKey=secrets/minio_kms_key.txt); see ADR-045 + zbook-runbook Daily bring-up" .Values.secrets.minio.kmsKey | trim -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-minio-secret
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-password: {{ $secretKey | quote }}
  # MinIO expects `<name>:<base64-key>` as the value of
  # MINIO_KMS_SECRET_KEY. Bake the "audittrace-key:" prefix here so the
  # StatefulSet can `valueFrom` a complete string and never inline the
  # key into the Pod spec.
  kms-master-key: {{ printf "audittrace-key:%s" $kmsKey | quote }}
{{- end }}
