{{- /* ADR-048 PR-B2 ‚Äî Docker Hub Pro imagePullSecret.

       Renders `kubernetes.io/dockerconfigjson` Secret consumed by
       audittrace-content-control's Deployment (its values.yaml
       references imagePullSecrets: [{name: audittrace-dockerhub-pull}]).

       Render gate: both secrets.dockerHub.username AND
       secrets.dockerHub.pat must be non-empty. Pre-existing
       chart-rendering tests (promtail, otel-collector,
       summariser-role, etc.) that don't care about Docker Hub still
       render cleanly without supplying creds ‚Äî the dockerHub.* values
       default to empty so this template just doesn't fire.

       2026-05-14 ‚Äî was additionally gated on `not .Values.vault.enabled`
       with a comment claiming an alternative path (Vault Agent template
       OR a one-shot Job) injected the Secret in vault-enabled mode.
       That path was never actually built. Symptom: kubelet event
       `FailedToRetrieveImagePullSecret ‚Ä¶ (audittrace-dockerhub-pull)`
       on the content-control pod, harmless only because the image was
       already cached on the node. A fresh deploy or image rotation
       would have failed silently. Same shape as the cc-rabbitmq bug
       (`project_amqp_topology_bootstrap`); same fix ‚Äî drop the vault
       gate so the Secret renders whenever the dockerHub creds are
       supplied, regardless of vault mode. Vault integration for this
       credential is a future follow-up via the Bitnami subchart
       `auth.existingPullSecret`-style pattern. */ -}}
{{- if and .Values.secrets.dockerHub.username .Values.secrets.dockerHub.pat }}
{{- $username := .Values.secrets.dockerHub.username | trim -}}
{{- $pat := .Values.secrets.dockerHub.pat | trim -}}
{{- $auth := printf "%s:%s" $username $pat | b64enc -}}
{{- $dockerconfig := dict "auths" (dict "https://index.docker.io/v1/" (dict "username" $username "password" $pat "auth" $auth)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: audittrace-dockerhub-pull
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerconfig | toJson | b64enc | quote }}
{{- end }}
