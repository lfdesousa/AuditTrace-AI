{{- /* ADR-048 PR-B2 ‚Äî Docker Hub Pro imagePullSecret.

       Renders `kubernetes.io/dockerconfigjson` Secret consumed by
       audittrace-content-control's Deployment (its values.yaml
       references imagePullSecrets: [{name: audittrace-dockerhub-pull}]).

       Render gate (intentionally permissive): both
       secrets.dockerHub.username AND secrets.dockerHub.pat must be
       non-empty AND vault.enabled must be false. This way:

       - Pre-existing chart-rendering tests (promtail, otel-collector,
         summariser-role, etc.) that don't care about Docker Hub still
         render cleanly without supplying creds.
       - Operators who want the imagePullSecret pass:
         `--set-file secrets.dockerHub.pat=secrets/docker_hub_pat.txt`
         and the Secret renders.
       - Operators on vault.enabled=true source from
         kv/audittrace/docker-hub/pat (seeded by setup-vault.sh)
         via a separate path (Vault Agent template OR a one-shot
         `kubectl create secret docker-registry` Job that reads
         /vault/secrets/dockerhub.json). Either way the Secret name
         is the same so the sibling chart's imagePullSecrets reference
         resolves identically. */ -}}
{{- if and (not .Values.vault.enabled) .Values.secrets.dockerHub.username .Values.secrets.dockerHub.pat }}
{{- $username := .Values.secrets.dockerHub.username | trim -}}
{{- $pat := .Values.secrets.dockerHub.pat | trim -}}
{{- $auth := printf "%s:%s" $username $pat | b64enc -}}
{{- $dockerconfig := dict "auths" (dict "https://index.docker.io/v1/" (dict "username" $username "password" $pat "auth" $auth)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: audittrace-dockerhub-pull
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerconfig | toJson | b64enc | quote }}
{{- end }}
