{{- /* When vault.enabled, the admin password lives at kv/audittrace/keycloak/admin
       and is sourced via Vault Agent (ADR-043 §4); this Secret is not rendered. */ -}}
{{- if and .Values.keycloak.enabled (not .Values.vault.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-keycloak-secret
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.secrets.keycloak.adminPassword | quote }}
{{- end }}
