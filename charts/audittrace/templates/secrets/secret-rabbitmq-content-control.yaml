{{- /* ADR-057 — content-control user password Secret.

       The Bitnami subchart owns the broker-admin user (audittrace)
       password Secret (`{{ .Release.Name }}-rabbitmq`). PR-B2.5
       adds a SECOND user (`content-control`) with scoped vhost
       permissions; that user's password lives here.

       Both passwords seeded into Vault by setup-vault.sh:
       - kv/audittrace/rabbitmq/password — admin user
       - kv/audittrace/content-control/rabbitmq/password — content-control user

       2026-05-14 — was gated on `not .Values.vault.enabled` with
       a comment claiming a Vault Agent template rendered this
       Secret in vault-enabled mode. No such template ever existed,
       and the audittrace-content-control sibling chart references
       this Secret unconditionally via `secretKeyRef`. Result:
       prod (vault.enabled=true) silently rendered no Secret →
       cc-chart pod started with empty CONTENT_CONTROL_RABBITMQ_PASSWORD
       → AMQP auth failed → scan_worker silently dead. Pod stayed
       3/3 Ready because /v1/health doesn't probe AMQP.
       Anchor: `project_amqp_topology_bootstrap`.

       Fix: render whenever `secrets.rabbitmq.contentControlPassword`
       is supplied, regardless of vault.enabled. The same values
       file supplies it in both modes today (values-local.yaml +
       values-ci.yaml). Vault integration for this credential is
       tracked as a future follow-up — should land via the
       Bitnami subchart's `auth.existingPasswordSecret` pattern,
       NOT via a side-channel template like the obsolete comment
       implied. */ -}}
{{- if and .Values.rabbitmq.enabled .Values.secrets.rabbitmq.contentControlPassword }}
{{- $pw := .Values.secrets.rabbitmq.contentControlPassword | trim -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-rabbitmq-content-control
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.rabbitmq.contentControlUser | quote }}
  password: {{ $pw | quote }}
{{- end }}
