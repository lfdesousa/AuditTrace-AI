{{- /* ADR-057 — content-control user password Secret.

       The Bitnami subchart owns the broker-admin user (audittrace)
       password Secret (`{{ .Release.Name }}-rabbitmq`). PR-B2.5
       adds a SECOND user (`content-control`) with scoped vhost
       permissions; that user's password lives here.

       Both passwords seeded into Vault by setup-vault.sh:
       - kv/audittrace/rabbitmq/password — admin user
       - kv/audittrace/content-control/rabbitmq/password — content-control user

       When vault.enabled=true, this Secret is rendered by Vault
       Agent via a separate template; this k8s-Secret template
       skips. */ -}}
{{- if and .Values.rabbitmq.enabled (not .Values.vault.enabled) .Values.secrets.rabbitmq.contentControlPassword }}
{{- $pw := .Values.secrets.rabbitmq.contentControlPassword | trim -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-rabbitmq-content-control
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.rabbitmq.contentControlUser | quote }}
  password: {{ $pw | quote }}
{{- end }}
