{{- if .Values.externalLLM.enabled }}
{{- $host := required "externalLLM.host (FQDN) is required when externalLLM.enabled=true — see ADR-045 (FQDN-only)" .Values.externalLLM.host }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-llm-summarizer
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-summarizer
spec:
  type: ExternalName
  externalName: {{ $host | quote }}
  ports:
    - port: {{ .Values.externalLLM.summarizer.port }}
      targetPort: {{ .Values.externalLLM.summarizer.port }}
      protocol: TCP
      name: http
{{- end }}
