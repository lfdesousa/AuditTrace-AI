apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-llm-chat
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-chat
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.externalLLM.chat.port }}
      targetPort: {{ .Values.externalLLM.chat.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .Release.Name }}-llm-chat
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
subsets:
  - addresses:
      - ip: {{ .Values.externalLLM.hostIP }}
    ports:
      - port: {{ .Values.externalLLM.chat.port }}
        protocol: TCP
        name: http
