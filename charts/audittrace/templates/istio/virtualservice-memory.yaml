{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Release.Name }}-memory
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
spec:
  hosts:
    - "*"
  gateways:
    - {{ .Values.istio.gateway.name }}
  http:
    # Catch-all route — Keycloak VirtualService has higher-priority
    # prefix matches for /realms and /admin, so this handles everything else.
    - route:
        - destination:
            host: {{ .Release.Name }}-memory-server.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: {{ .Values.memoryServer.port }}
{{- end }}
