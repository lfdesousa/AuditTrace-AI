{{- if .Values.istio.enabled }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Release.Name }}-allow-redis
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  action: ALLOW
  rules:
    # memory-server only. Redis is reserved for token cache +
    # tool-result cache + ADR-046 async chat persistence. Scan
    # control (ADR-048) moved to RabbitMQ in PR-B2.5 / ADR-057;
    # content-control does NOT need Redis access.
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ .Values.memoryServer.serviceAccount.name }}"
      to:
        - operation:
            ports: ["6379"]
{{- end }}
