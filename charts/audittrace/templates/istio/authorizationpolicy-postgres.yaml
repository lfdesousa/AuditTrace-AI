{{- if .Values.istio.enabled }}
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Release.Name }}-allow-postgres
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ .Values.memoryServer.serviceAccount.name }}"
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/default"
              {{- if .Values.vault.enabled }}
              # When vault.enabled=true, Keycloak runs under its own SA so
              # Vault Agent can fetch kv/audittrace/keycloak/* + postgres/*
              # (ADR-043 §2). Postgres mTLS must allow that SA.
              - "cluster.local/ns/{{ .Release.Namespace }}/sa/{{ .Release.Name }}-keycloak"
              {{- end }}
      to:
        - operation:
            ports: ["5432"]
{{- end }}
