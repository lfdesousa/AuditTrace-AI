{{- if .Values.observability.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-promtail-config
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://{{ .Values.observability.external.lokiIP | default .Values.global.hostNodeIP }}:{{ .Values.observability.external.lokiPort | default 3100 }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          # Only our own namespace — keep traffic volume proportional to ADR-028
          # scope and avoid ingesting kube-system chatter.
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: {{ .Release.Namespace }}
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log
{{- end }}
