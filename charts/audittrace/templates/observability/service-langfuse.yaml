{{- if .Values.observability.external.langfuseHost }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-langfuse
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse
spec:
  type: ExternalName
  externalName: {{ .Values.observability.external.langfuseHost | quote }}
  ports:
    - port: {{ .Values.observability.external.langfusePort }}
      targetPort: {{ .Values.observability.external.langfusePort }}
      protocol: TCP
      name: http
{{- end }}
