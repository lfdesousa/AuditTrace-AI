{{- if and .Values.minio.enabled .Values.vault.enabled }}
# ServiceAccount for the MinIO StatefulSet when Vault is the secret
# store (ADR-043 §2). The Vault Kubernetes-auth role 'minio' binds
# this SA -> policy 'minio' -> read on kv/audittrace/minio/*.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-minio
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
