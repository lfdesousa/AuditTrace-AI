{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-minio
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: {{ .Release.Name }}-minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "audittrace.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "audittrace.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
        sidecar.istio.io/inject: "true"
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "audittrace.vaultAnnotations.minio" . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ .Release.Name }}-minio
      {{- end }}
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: IfNotPresent
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args: ["set -a; . /vault/secrets/env; set +a; exec minio server /data --console-address :9001"]
          {{- else }}
          command:
            - minio
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          {{- end }}
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | quote }}
            {{- if not .Values.vault.enabled }}
            # vault.enabled=false branch — K8s Secret. When vault.enabled=true
            # these come from /vault/secrets/env at runtime (ADR-043 §4).
            # The "audittrace-key:" prefix is baked into the Secret's
            # kms-master-key value (mitigation for the 2026-04-24 outage —
            # ADR-045 PM-1).
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-minio-secret
                  key: root-password
            - name: MINIO_KMS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-minio-secret
                  key: kms-master-key
            {{- end }}
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.minio.persistence.storageClass }}
        storageClassName: {{ .Values.minio.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
{{- end }}
