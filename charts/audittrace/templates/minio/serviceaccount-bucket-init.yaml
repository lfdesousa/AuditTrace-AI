{{- /* ADR-048 PR-B8 — dedicated SA for the bucket-init Job.

       The bucket-init Job needs Istio mTLS to reach MinIO under the
       cluster's STRICT PeerAuthentication. mTLS gives it a SPIFFE
       identity tied to a ServiceAccount; that SA must appear in
       `audittrace-allow-minio` AuthorizationPolicy's principals list.

       Reusing memory-server's SA would be semantically wrong (this
       Job is a chart-install hook, not memory-server). Reusing
       audittrace-minio's SA would let the Job impersonate the MinIO
       StatefulSet itself. A dedicated SA keeps the principal scope
       tight: the SA exists only for this hook, and the AuthorizationPolicy
       grants only the access the hook needs. */ -}}
{{- if and .Values.minio.enabled .Values.istio.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-bucket-init
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-bucket-init
{{- end }}
