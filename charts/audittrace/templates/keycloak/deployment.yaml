{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "audittrace.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        {{- include "audittrace.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
        sidecar.istio.io/inject: "true"
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "audittrace.vaultAnnotations.keycloak" . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.vault.enabled }}
      serviceAccountName: {{ .Release.Name }}-keycloak
      {{- end }}
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: IfNotPresent
          {{- if .Values.vault.enabled }}
          # Source Vault-injected env file before exec'ing keycloak.
          # The guard fails fast with exit 79 + a structured diagnostic
          # if /vault/secrets/env is missing — see _helpers.tpl
          # `audittrace.vaultSecretFileGuard`. Replaces the previous
          # cryptic shell error from 2026-05-03 incident.
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{ include "audittrace.vaultSecretFileGuard" . | nindent 14 }}
              set -a
              . /vault/secrets/env
              set +a
              exec /opt/keycloak/bin/kc.sh start-dev --import-realm --health-enabled=true
          {{- else }}
          command:
            - /opt/keycloak/bin/kc.sh
          args:
            - start-dev
            - --import-realm
            - --health-enabled=true
          {{- end }}
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/keycloak"
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            {{- if not .Values.vault.enabled }}
            # vault.enabled=false branch. When vault.enabled=true these
            # land at runtime via /vault/secrets/env (ADR-043 §4).
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-secret
                  key: admin-password
            {{- end }}
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KC_HOSTNAME_URL
              value: {{ .Values.keycloak.hostnameUrl | quote }}
            - name: KC_HOSTNAME_ADMIN_URL
              value: {{ .Values.keycloak.hostnameUrl | quote }}
            - name: KC_PROXY
              value: edge
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/realm.json
              subPath: realm.json
              readOnly: true
      volumes:
        - name: realm-import
          configMap:
            name: {{ .Release.Name }}-keycloak-realm
{{- end }}
