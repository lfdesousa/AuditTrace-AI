{{- if and .Values.keycloak.enabled .Values.vault.enabled }}
# ServiceAccount for the Keycloak pod when Vault is the secret store
# (ADR-043 §2). The Vault Kubernetes-auth role 'keycloak' binds this
# SA -> policy 'keycloak' -> read on kv/audittrace/keycloak/* +
# kv/audittrace/postgres/*.
#
# When vault.enabled=false, Keycloak runs as the namespace's default
# SA — no rotation hygiene story, but the legacy path is preserved
# for laptop-first dev.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
{{- end }}
