{{- if .Values.keycloak.enabled }}
# kcadm bash script consumed by the post-install/post-upgrade
# `ensure-memory-scopes` Job (ADR-XXX — memory CRUD backoffice).
#
# Why a separate ConfigMap rather than inlining the script in the
# Job manifest: the script is ~100 lines and we want it diffable in
# `git log` without touching the Job's spec each time the kcadm
# logic evolves. Same factoring as
# `templates/postgres/configmap-summariser-sql.yaml`.
#
# The script is idempotent — safe to re-run on every helm upgrade
# (which is what the post-upgrade hook does). It only ever creates
# missing scopes / missing client bindings; never deletes or
# rewrites existing realm content.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-memory-scopes-script
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
data:
  ensure-memory-scopes.sh: |
    #!/usr/bin/env bash
    # Ensure the three `memory:<layer>:write` Keycloak scopes exist on
    # the audittrace realm and are attached to the right clients.
    #
    # The chart's `realm-audittrace.json` declares these scopes, but
    # `kc.sh start --import-realm` only imports on a FRESH realm — it
    # does NOT propagate updates to an existing realm. Without this
    # Job, every upgrade that adds a scope to realm.json silently
    # leaves the running realm without it, and the `/memory/<layer>`
    # write endpoints 403 every operator JWT.
    #
    # Idempotent: every action is gated on a "does it already exist?"
    # check. Re-runs are safe (and expected on every helm upgrade).
    set -euo pipefail

    REALM="${REALM:-audittrace}"
    KC_BASE_URL="${KC_BASE_URL:-http://{{ .Release.Name }}-keycloak:8080}"
    KCADM=/opt/keycloak/bin/kcadm.sh

    # The three scopes this PR introduces. Kept in lockstep with
    # realm-audittrace.json's clientScopes[] block — adding a scope
    # there means adding it here too. The chart-render test
    # (`TestRealmMemoryWriteScopes`) catches drift between the two.
    SCOPES=(
      "memory:episodic:write"
      "memory:procedural:write"
      "memory:semantic:write"
    )

    # Vault-Agent rendered the admin password to /vault/secrets/env
    # when vault.enabled=true; otherwise it's a regular env var via
    # K8s Secret.
    {{- if .Values.vault.enabled }}
    set -a; . /vault/secrets/env; set +a
    {{- end }}

    if [[ -z "${KEYCLOAK_ADMIN_PASSWORD:-}" ]]; then
      echo "❌ KEYCLOAK_ADMIN_PASSWORD is empty — refusing to authenticate." >&2
      exit 1
    fi

    # Keycloak rolls during a chart upgrade — wait for it to accept
    # connections before kcadm tries to authenticate.
    #
    # The Keycloak image is minimal (no curl, no wget, no netcat). We
    # use bash's built-in `/dev/tcp/<host>/<port>` to test reachability
    # at the TCP layer, then poll kcadm-config-credentials to confirm
    # the realm endpoint is responding. 60 × 2s = 120s of patience,
    # well beyond a typical roll. Same shape as the summariser-role
    # Job's pg_isready loop, retargeted at HTTP because that's what
    # we have access to here.
    KC_HOST="${KC_BASE_URL#http://}"
    KC_HOST="${KC_HOST%%:*}"
    KC_PORT="${KC_BASE_URL##*:}"
    echo "▶ waiting for Keycloak at ${KC_HOST}:${KC_PORT}..."
    for i in $(seq 1 60); do
      if (exec 3<>"/dev/tcp/${KC_HOST}/${KC_PORT}") 2>/dev/null; then
        exec 3<&- 3>&-
        echo "  ✓ Keycloak TCP reachable (attempt ${i})"
        break
      fi
      if [ "$i" -eq 60 ]; then
        echo "❌ Keycloak did not become reachable within 120s." >&2
        exit 1
      fi
      sleep 2
    done

    # TCP-reachable doesn't mean the realm endpoints are serving yet —
    # Keycloak's HTTP layer comes up after the JVM finishes warming
    # the realm cache. Retry kcadm authentication a few times to
    # absorb the gap.
    echo "▶ authenticating to Keycloak admin..."
    for i in $(seq 1 30); do
      if "${KCADM}" config credentials \
            --server "${KC_BASE_URL}" \
            --realm master \
            --user admin \
            --password "${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null 2>&1; then
        echo "  ✓ authenticated (attempt ${i})"
        break
      fi
      if [ "$i" -eq 30 ]; then
        echo "❌ kcadm authentication failed after 30 attempts." >&2
        # Final attempt with stderr surfaced so the Job log shows why.
        "${KCADM}" config credentials \
          --server "${KC_BASE_URL}" \
          --realm master \
          --user admin \
          --password "${KEYCLOAK_ADMIN_PASSWORD}" || true
        exit 1
      fi
      sleep 2
    done

    # ── Step 1: ensure each scope exists ──────────────────────────
    #
    # The Keycloak base image is minimal — no awk, no jq, no curl.
    # We parse kcadm's CSV output with bash's `while IFS=, read`
    # builtin, which is available in every bash 4+ shell and needs
    # no external tooling.
    find_scope_id() {
      local target="$1" id name
      while IFS=, read -r id name; do
        if [[ "${name}" == "${target}" ]]; then
          echo "${id}"
          return 0
        fi
      done < <("${KCADM}" get client-scopes -r "${REALM}" \
                 --fields id,name --format csv --noquotes 2>/dev/null)
      return 1
    }

    declare -A SCOPE_ID
    for SCOPE in "${SCOPES[@]}"; do
      if EXISTING=$(find_scope_id "${SCOPE}"); then
        echo "  ⊝ scope ${SCOPE}: exists (${EXISTING})"
        SCOPE_ID["${SCOPE}"]="${EXISTING}"
      else
        "${KCADM}" create client-scopes -r "${REALM}" \
          -s "name=${SCOPE}" \
          -s protocol=openid-connect \
          -s 'attributes."include.in.token.scope"=true' >/dev/null
        if NEW_ID=$(find_scope_id "${SCOPE}"); then
          echo "  ✓ scope ${SCOPE}: created (${NEW_ID})"
          SCOPE_ID["${SCOPE}"]="${NEW_ID}"
        else
          echo "❌ scope ${SCOPE}: created but id not resolvable" >&2
          exit 1
        fi
      fi
    done

    # ── Step 2: bind each scope to the right clients ──────────────
    # admin-client gets all three as DEFAULT scopes (always issued).
    # opencode + webui get them as OPTIONAL scopes (operator opts in
    # per request via the `scope=` parameter).
    declare -A CLIENT_KIND
    CLIENT_KIND["admin-client"]="default"
    CLIENT_KIND["audittrace-opencode"]="optional"
    CLIENT_KIND["audittrace-webui"]="optional"

    find_client_id() {
      local target="$1" line id
      while IFS= read -r line; do
        # kcadm with --fields id outputs one ID per line (already
        # unquoted with --noquotes). The -q query restricts the list
        # to clients matching the clientId, but kcadm still returns
        # an array — take the first non-empty line.
        id="${line//\"/}"
        if [[ -n "${id}" ]]; then
          echo "${id}"
          return 0
        fi
      done < <("${KCADM}" get clients -r "${REALM}" \
                 -q "clientId=${target}" \
                 --fields id --format csv --noquotes 2>/dev/null)
      return 1
    }

    bind_scope() {
      local CLIENT_ID="$1" SCOPE="$2" KIND="$3"
      local CLIENT_UUID SCOPE_UUID PATH_SUFFIX

      if ! CLIENT_UUID=$(find_client_id "${CLIENT_ID}"); then
        echo "  ⚠ client ${CLIENT_ID}: not found (skipped)"
        return 0
      fi
      SCOPE_UUID="${SCOPE_ID[$SCOPE]:-}"
      if [[ -z "${SCOPE_UUID}" ]]; then
        echo "❌ scope ${SCOPE}: id not resolvable — bug" >&2
        return 1
      fi

      if [[ "${KIND}" == "default" ]]; then
        PATH_SUFFIX="default-client-scopes"
      else
        PATH_SUFFIX="optional-client-scopes"
      fi

      # PUT to the binding endpoint is idempotent — Keycloak responds
      # 204 whether the binding already existed or was just created.
      #
      # Why `-b '{}'` instead of `-s ''`: kcadm 24's `update` rejects an
      # empty `-s` argument with "Invalid key=value parameter: []".
      # `-b '{}'` sends an empty JSON body, which is what the Keycloak
      # REST API actually expects on this endpoint (it's a side-effect-only
      # PUT — Keycloak ignores any body content). Discovered the hard way
      # on 2026-05-03: the script reported "✓ bound" because the kcadm
      # error was swallowed by `>/dev/null 2>&1 || true`, but the
      # binding never landed in the realm. Surface kcadm errors now.
      if ! "${KCADM}" update \
            "clients/${CLIENT_UUID}/${PATH_SUFFIX}/${SCOPE_UUID}" \
            -r "${REALM}" -b '{}' >/dev/null 2>&1; then
        echo "  ✗ ${CLIENT_ID} ${KIND} ← ${SCOPE} (kcadm rejected the bind)" >&2
        return 1
      fi
      echo "  ✓ ${CLIENT_ID} ${KIND} ← ${SCOPE}"
    }

    for CLIENT_ID in "${!CLIENT_KIND[@]}"; do
      KIND="${CLIENT_KIND[$CLIENT_ID]}"
      echo "▶ binding scopes to client ${CLIENT_ID} (${KIND})..."
      for SCOPE in "${SCOPES[@]}"; do
        bind_scope "${CLIENT_ID}" "${SCOPE}" "${KIND}"
      done
    done

    # ── Step 3: ensure user-identity protocol mappers ─────────────
    #
    # Without these mappers on user-facing clients, JWTs carry only a
    # bare UUID `sub` and no `preferred_username` / `email` / `name`
    # claims — every audit/log entry shows the UUID with no human
    # identifier. Found in PR A's 2026-05-03 live test: smoke JWT had
    # `preferred_username: None`.
    #
    # Why direct protocol mappers instead of the standard `profile`
    # scope: Keycloak's `--import-realm` honours the realm.json's
    # explicit `clientScopes` list and does NOT auto-create the
    # built-in `profile` / `email` scopes when they're absent from the
    # imported list. Adding them would mean either creating the scopes
    # ourselves (with their full mapper bundle) or pulling in Keycloak's
    # default scopes — both larger lifts. Direct client-level mappers
    # are the surgical fix and what realm.json now declares for fresh
    # installs.
    #
    # admin-client doesn't need these — service accounts have no human
    # identity to surface.
    ensure_mapper() {
      local CLIENT_ID="$1" MAPPER_NAME="$2" USER_ATTR="$3" CLAIM_NAME="$4"
      local CLIENT_UUID
      if ! CLIENT_UUID=$(find_client_id "${CLIENT_ID}"); then
        echo "  ⚠ client ${CLIENT_ID}: not found (skipped)"
        return 0
      fi
      # Idempotency: list existing mappers, skip if name already present.
      local existing
      existing=$("${KCADM}" get \
                   "clients/${CLIENT_UUID}/protocol-mappers/models" \
                   -r "${REALM}" --fields name --format csv --noquotes \
                   2>/dev/null | grep -Fx "${MAPPER_NAME}" || true)
      if [[ -n "${existing}" ]]; then
        echo "  ⊝ ${CLIENT_ID} mapper ${MAPPER_NAME}: exists"
        return 0
      fi
      # Create the mapper. `oidc-usermodel-property-mapper` reads
      # built-in user properties (username, email, firstName, lastName)
      # and stamps them as the named claim on the access + id token.
      #
      # Why printf-into-pipe instead of a heredoc: this script lives
      # inside a YAML block-scalar in a ConfigMap manifest. Bash
      # heredocs with `<<EOF` require their body to start at column 0,
      # which conflicts with YAML's mandatory consistent indentation.
      # Building the JSON via a single-line printf sidesteps the
      # indentation conflict cleanly.
      local body
      body=$(printf '{"name":"%s","protocol":"openid-connect","protocolMapper":"oidc-usermodel-property-mapper","config":{"user.attribute":"%s","claim.name":"%s","jsonType.label":"String","id.token.claim":"true","access.token.claim":"true","userinfo.token.claim":"true"}}' \
        "${MAPPER_NAME}" "${USER_ATTR}" "${CLAIM_NAME}")
      printf '%s' "${body}" | "${KCADM}" create \
        "clients/${CLIENT_UUID}/protocol-mappers/models" \
        -r "${REALM}" -f - >/dev/null
      echo "  ✓ ${CLIENT_ID} mapper ${MAPPER_NAME}: created"
    }

    for CLIENT_ID in audittrace-opencode audittrace-webui; do
      echo "▶ ensuring user-identity mappers on ${CLIENT_ID}..."
      ensure_mapper "${CLIENT_ID}" preferred-username username preferred_username
      ensure_mapper "${CLIENT_ID}" email email email
      ensure_mapper "${CLIENT_ID}" given-name firstName given_name
      ensure_mapper "${CLIENT_ID}" family-name lastName family_name
    done

    echo "✅ memory-scopes provisioning complete."

    # ── Istio sidecar shutdown ────────────────────────────────────
    # Same intent as the summariser-role Job (Phase C.8 root cause):
    # without telling Envoy to quit, istio-proxy keeps the Pod 2/3
    # NotReady forever and the helm post-upgrade hook reports
    # `failed: context deadline exceeded`.
    #
    # The Keycloak image has no curl/wget. We use bash's built-in
    # /dev/tcp socket to issue a one-shot HTTP/1.0 POST against the
    # local Envoy admin endpoint. Idempotent — if the sidecar already
    # quit, the connection refused and we move on.
    {{- if .Values.istio.enabled }}
    # Wrap in a subshell + `set +e` so any fd-close glitch can't fail
    # the whole script (`set -euo pipefail` at the top would otherwise
    # propagate). The provisioning above is already complete; this
    # block is a Pod-cleanup convenience, not a correctness step.
    (
      set +e
      if (exec 4<>/dev/tcp/127.0.0.1/15020) 2>/dev/null; then
        printf 'POST /quitquitquit HTTP/1.0\r\nHost: 127.0.0.1\r\nContent-Length: 0\r\n\r\n' >&4
        cat <&4 >/dev/null 2>&1
        exec 4<&-
        echo "istio quitquitquit: sent"
      else
        echo "istio quitquitquit: socket open failed (sidecar may already be gone)"
      fi
    ) || true
    {{- end }}
    echo "Job completing."
{{- end }}
