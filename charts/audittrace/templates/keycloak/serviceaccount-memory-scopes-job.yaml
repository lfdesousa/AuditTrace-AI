{{- if .Values.keycloak.enabled }}
# Dedicated SA for the post-install/post-upgrade memory-scopes Job.
# Keeps the Job's Vault role + Istio AuthorizationPolicy principal
# scoped narrowly to "this one Job, nothing else", instead of
# reusing the namespace `default` SA.
#
# When vault.enabled=true the Job's Vault role
# `memory-scopes-job` (defined in templates/vault/configmap-policies.yaml)
# binds to this SA, granting read on kv/audittrace/keycloak/* only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-memory-scopes-job
  labels:
    {{- include "audittrace.labels" . | nindent 4 }}
{{- end }}
