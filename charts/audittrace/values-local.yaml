# k3s local development — Ryzen AI MAX+ 395, 64 GB
global:
  hostNodeIP: "192.168.1.100"  # adjust to your node IP

memoryServer:
  image:
    repository: localhost:5000/audittrace/memory-server
    tag: latest

istio:
  gateway:
    hosts:
      - "audittrace.local"
      - "localhost"

tls:
  createSecret: true
  # Set these via --set-file or generate with mkcert:
  #   mkcert -cert-file tls.crt -key-file tls.key audittrace.local localhost
  crt: ""
  key: ""
